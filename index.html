<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>connec+a</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700;900&family=Zen+Old+Mincho:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ai:#1a2744;--ai-mid:#2a4a7f;--ai-soft:#4a6fa5;--ai-pale:#d4e4f7;
      --shiro:#f8f9fc;--shiro-warm:#fdfaf5;--shiro-2:#eef2f8;--border:rgba(42,74,127,.15);
      --haru:#f4b8cb;--natsu:#7b5ea7;--aki:#d4511a;--fuyu:#b8d4f0;--matcha:#4e7252;
      --shadow:0 2px 16px rgba(26,39,68,.08);--shadow-md:0 8px 32px rgba(26,39,68,.14);--shadow-lg:0 16px 48px rgba(26,39,68,.2);
      --r:16px;--rs:10px;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--shiro);color:var(--ai);min-height:100vh;overflow-x:hidden;}
    .indigo-pattern{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 8 L72 40 L40 72 L8 40 Z' fill='none' stroke='%231a2744' stroke-width='1.5'/%3E%3Ccircle cx='40' cy='40' r='3' fill='%231a2744'/%3E%3C/svg%3E");}
    .seasons-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .petal{position:absolute;font-size:.9rem;animation:petalFall linear infinite;opacity:0;}
    @keyframes petalFall{0%{transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0;}5%{opacity:.5;}95%{opacity:.3;}100%{transform:translateY(105vh) rotate(720deg) translateX(60px);opacity:0;}}
    .hotaru{position:absolute;width:3px;height:3px;border-radius:50%;background:#c8e832;box-shadow:0 0 6px #c8e832;animation:hotaruFloat ease-in-out infinite;opacity:0;}
    @keyframes hotaruFloat{0%,100%{opacity:0;transform:translate(0,0);}20%{opacity:.8;}50%{transform:translate(25px,-18px);}80%{opacity:.5;}}
    .momiji{position:absolute;font-size:.85rem;animation:momijiDrift linear infinite;opacity:0;}
    @keyframes momijiDrift{0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0;}8%{opacity:.5;}92%{opacity:.25;}100%{transform:translateY(105vh) rotate(-540deg) translateX(-80px);opacity:0;}}
    .yuki{position:absolute;border-radius:50%;background:rgba(184,212,240,.7);animation:yukiFall linear infinite;opacity:0;}
    @keyframes yukiFall{0%{opacity:0;}10%{opacity:.7;}90%{opacity:.3;}100%{transform:translateY(105vh);opacity:0;}}
    .season-bar{height:3px;background:linear-gradient(90deg,var(--haru),var(--natsu),var(--aki),var(--fuyu));}
 
    /* HEADER */
    .header{position:sticky;top:0;z-index:100;background:rgba(248,249,252,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
    .header__logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
    .header__logo-mark{width:36px;height:36px;background:var(--ai);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:.65rem;color:#fff;font-weight:900;}
    .header__logo-text{font-family:'Zen Old Mincho',serif;font-size:1.08rem;color:var(--ai);font-weight:700;letter-spacing:.08em;}
    .header__logo-text span{color:var(--ai-soft);}
    .header__right{display:flex;align-items:center;gap:10px;}
    .lang-sel{padding:5px 10px;border-radius:99px;font-size:.72rem;border:1.5px solid var(--border);background:transparent;color:var(--ai-mid);cursor:pointer;outline:none;font-family:'Noto Sans JP',sans-serif;}
    .header__btn{display:none;padding:8px 18px;border-radius:99px;font-size:.8rem;font-weight:700;border:1.5px solid var(--ai);background:var(--ai);color:#fff;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .header__btn:hover{background:var(--ai-mid);}
    .avatar-btn{display:none;width:38px;height:38px;border-radius:50%;background:var(--ai);border:2px solid transparent;cursor:pointer;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:.78rem;color:#fff;font-weight:900;transition:transform .2s,box-shadow .2s;position:relative;}
    .avatar-btn:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(26,39,68,.28);}
    .avatar-badge{position:absolute;top:-2px;right:-2px;width:11px;height:11px;background:#f59e0b;border-radius:50%;border:2px solid var(--shiro);display:none;}
 
    /* PAGES */
    main{position:relative;z-index:2;padding:40px 20px;}
    .container{max-width:900px;margin:0 auto;}
    .container-sm{max-width:540px;margin:0 auto;}
    .page{display:none;}
    .page.active{display:block;animation:pageIn .4s ease both;}
    @keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
 
    /* AUTH */
    .auth-wrap{min-height:calc(100vh - 65px);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:2;}
    .auth-card{background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);padding:44px 40px;width:100%;max-width:440px;border:1px solid var(--border);position:relative;overflow:hidden;}
    .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--haru),var(--natsu),var(--aki),var(--fuyu));}
    .auth-logo{text-align:center;margin-bottom:10px;}
    .auth-logo-mark{width:56px;height:56px;background:var(--ai);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:.8rem;color:#fff;font-weight:900;margin:0 auto 12px;box-shadow:0 6px 20px rgba(26,39,68,.2);}
    .auth-logo-name{font-family:'Zen Old Mincho',serif;font-size:1.5rem;font-weight:900;color:var(--ai);letter-spacing:.08em;}
    .auth-logo-sub{font-size:.7rem;color:var(--ai-soft);letter-spacing:.22em;margin-top:3px;text-transform:uppercase;}
    .auth-welcome{text-align:center;margin:18px 0 24px;padding:16px 20px;background:linear-gradient(135deg,rgba(244,184,203,.12),rgba(42,74,127,.06));border-radius:12px;border:1px solid rgba(42,74,127,.08);}
    .auth-welcome__title{font-family:'Zen Old Mincho',serif;font-size:1.05rem;font-weight:700;color:var(--ai);margin-bottom:5px;}
    .auth-welcome__desc{font-size:.78rem;color:var(--ai-soft);line-height:1.8;}
    .auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--shiro-2);border-radius:var(--rs);padding:4px;}
    .auth-tab{flex:1;padding:10px;border:none;background:none;font-size:.85rem;font-weight:700;color:var(--ai-soft);cursor:pointer;border-radius:8px;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .auth-tab.active{background:#fff;color:var(--ai);box-shadow:var(--shadow);}
    .auth-panel{display:none;}
    .auth-panel.active{display:block;}
    .sent-box{text-align:center;padding:16px 0;}
    .sent-box .icon-mark{width:56px;height:56px;border-radius:50%;background:var(--ai-pale);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
    .sent-box .icon-mark svg{width:26px;height:26px;stroke:var(--ai-mid);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .sent-box h3{font-family:'Zen Old Mincho',serif;font-size:1.1rem;color:var(--ai);margin-bottom:8px;}
    .sent-box p{font-size:.875rem;color:var(--ai-soft);line-height:1.8;}
    .sent-email{display:inline-block;background:var(--ai-pale);border-radius:7px;padding:5px 14px;font-weight:700;color:var(--ai-mid);margin:8px 0;font-size:.9rem;}
 
    /* EVENT CARDS */
    .event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:24px;}
    .event-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s;animation:cardIn .5s ease both;position:relative;}
    .event-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);}
    .event-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .event-card:nth-child(4n+1)::before{background:linear-gradient(90deg,var(--haru),#d080a0);}
    .event-card:nth-child(4n+2)::before{background:linear-gradient(90deg,var(--natsu),#5a3a8a);}
    .event-card:nth-child(4n+3)::before{background:linear-gradient(90deg,var(--aki),#a03010);}
    .event-card:nth-child(4n)::before{background:linear-gradient(90deg,#4a6fa5,var(--fuyu));}
    @keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .event-card:nth-child(1){animation-delay:.04s;}.event-card:nth-child(2){animation-delay:.08s;}.event-card:nth-child(3){animation-delay:.12s;}.event-card:nth-child(4){animation-delay:.16s;}
    .event-card__visual{height:80px;display:flex;align-items:center;justify-content:center;position:relative;}
    .event-card:nth-child(4n+1) .event-card__visual{background:linear-gradient(135deg,rgba(244,184,203,.2),rgba(137,201,122,.12));}
    .event-card:nth-child(4n+2) .event-card__visual{background:linear-gradient(135deg,rgba(123,94,167,.15),rgba(91,163,232,.12));}
    .event-card:nth-child(4n+3) .event-card__visual{background:linear-gradient(135deg,rgba(212,81,26,.12),rgba(232,200,74,.16));}
    .event-card:nth-child(4n) .event-card__visual{background:linear-gradient(135deg,rgba(184,212,240,.22),rgba(176,40,60,.08));}
    .event-card__visual-label{font-family:'Zen Old Mincho',serif;font-size:.62rem;letter-spacing:.22em;color:rgba(26,39,68,.28);font-weight:700;text-transform:uppercase;}
    .reg-badge{position:absolute;top:10px;right:10px;background:var(--ai);color:#fff;font-size:.63rem;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.04em;}
    .reg-badge.checked{background:var(--matcha);}
    .event-card__body{padding:16px 18px 18px;}
    .event-card__tag{font-size:.63rem;letter-spacing:.2em;color:var(--ai-soft);margin-bottom:4px;font-weight:600;text-transform:uppercase;}
    .event-card__name{font-family:'Zen Old Mincho',serif;font-size:1rem;font-weight:700;color:var(--ai);margin-bottom:4px;line-height:1.4;}
    .event-card__date{font-size:.75rem;color:var(--ai-soft);margin-bottom:12px;display:flex;align-items:center;gap:5px;}
    .event-card__date::before{content:'';display:inline-block;width:12px;height:12px;background:var(--ai-pale);border-radius:3px;flex-shrink:0;}
    .event-card__meta{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;background:var(--shiro);border-radius:var(--rs);padding:10px 12px;}
    .event-card__row{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;}
    .event-card__label{color:var(--ai-soft);}
    .event-card__value{font-weight:600;color:var(--ai);}
 
    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border-radius:99px;font-size:.875rem;font-weight:700;cursor:pointer;border:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);font-family:'Noto Sans JP',sans-serif;}
    .btn:active{transform:scale(.97)!important;}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
    .btn-ai{background:var(--ai);color:#fff;box-shadow:0 4px 14px rgba(26,39,68,.2);}
    .btn-ai:hover{background:var(--ai-mid);transform:translateY(-1px);}
    .btn-h{background:linear-gradient(135deg,var(--haru),#c97090);color:#fff;}
    .btn-n{background:linear-gradient(135deg,var(--natsu),#5a3a8a);color:#fff;}
    .btn-a{background:linear-gradient(135deg,var(--aki),#a03010);color:#fff;}
    .btn-f{background:linear-gradient(135deg,#4a6fa5,var(--fuyu));color:#fff;}
    .btn-green{background:linear-gradient(135deg,#4e7252,#2d7a20);color:#fff;}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ai-mid);}
    .btn-outline:hover{border-color:var(--ai-mid);background:var(--shiro-2);}
    .btn-full{width:100%;}
    .btn-lg{padding:14px 28px;font-size:.95rem;}
    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700;}
    .badge-free{background:rgba(78,114,82,.1);color:#2d7a20;}
    .badge-paid{background:rgba(42,74,127,.08);color:var(--ai-mid);}
    .badge-full{background:rgba(212,81,26,.1);color:var(--aki);}
 
    /* FORMS */
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:.8rem;font-weight:700;color:var(--ai-mid);margin-bottom:7px;letter-spacing:.04em;}
    .form-control{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.9rem;color:var(--ai);background:#fff;outline:none;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .form-control:focus{border-color:var(--ai-mid);box-shadow:0 0 0 3px rgba(42,74,127,.1);}
    .form-control::placeholder{color:rgba(74,111,165,.38);}
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:28px;margin-bottom:20px;border:1px solid var(--border);}
    .card-title{font-family:'Zen Old Mincho',serif;font-size:1.08rem;font-weight:700;color:var(--ai);margin-bottom:18px;display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--shiro-2);}
    .alert{padding:13px 16px;border-radius:var(--rs);font-size:.875rem;margin-bottom:14px;line-height:1.7;}
    .alert-success{background:#f0fdf4;border-left:3px solid #22c55e;color:#15803d;}
    .alert-danger{background:rgba(212,81,26,.06);border-left:3px solid var(--aki);color:#8a2010;}
    .alert-info{background:rgba(42,74,127,.06);border-left:3px solid var(--ai-soft);color:var(--ai-mid);}
    .alert-warning{background:rgba(184,212,240,.2);border-left:3px solid var(--fuyu);color:#3a5a7a;}
    .spinner{width:38px;height:38px;border:3px solid var(--shiro-2);border-top-color:var(--ai-mid);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{text-align:center;color:var(--ai-soft);font-size:.875rem;margin-top:8px;}
 
    /* 参加登録ページ */
    .event-hero{border-radius:var(--r);padding:22px 24px;margin-bottom:20px;}
    .eh-h{background:linear-gradient(135deg,rgba(244,184,203,.2),rgba(137,201,122,.12));border:1px solid rgba(244,184,203,.35);}
    .eh-n{background:linear-gradient(135deg,rgba(123,94,167,.15),rgba(91,163,232,.12));border:1px solid rgba(123,94,167,.25);}
    .eh-a{background:linear-gradient(135deg,rgba(212,81,26,.12),rgba(232,200,74,.14));border:1px solid rgba(212,81,26,.2);}
    .eh-f{background:linear-gradient(135deg,rgba(184,212,240,.22),rgba(176,40,60,.08));border:1px solid rgba(184,212,240,.35);}
    .event-hero__name{font-family:'Zen Old Mincho',serif;font-size:1.15rem;font-weight:700;color:var(--ai);margin-bottom:7px;}
    .event-hero__meta{font-size:.85rem;color:var(--ai-mid);line-height:2.2;}
    .ticket{background:linear-gradient(135deg,#fff,var(--shiro));border:1.5px dashed rgba(42,74,127,.2);border-radius:var(--r);padding:28px;text-align:center;margin:20px 0;position:relative;}
    .ticket::before,.ticket::after{content:'';position:absolute;width:22px;height:22px;background:var(--shiro);border-radius:50%;top:50%;transform:translateY(-50%);}
    .ticket::before{left:-12px;border:1.5px dashed rgba(42,74,127,.2);}
    .ticket::after{right:-12px;border:1.5px dashed rgba(42,74,127,.2);}
    .ticket__title{font-family:'Zen Old Mincho',serif;font-size:.75rem;font-weight:700;color:var(--ai-mid);margin-bottom:14px;letter-spacing:.2em;}
    .ticket__id{font-size:.65rem;color:var(--ai-soft);font-family:monospace;word-break:break-all;background:var(--shiro-2);padding:6px 10px;border-radius:6px;display:inline-block;}
    .payment-box{background:rgba(42,74,127,.05);border:1px solid rgba(42,74,127,.12);border-radius:var(--rs);padding:16px;margin-bottom:14px;font-size:.85rem;}
    .payment-box h4{color:var(--ai-mid);margin-bottom:6px;font-weight:700;}
    .payment-box p{color:var(--ai-mid);line-height:1.8;opacity:.85;}
    @keyframes burstIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
 
    /* マイページ */
    .profile-card{border-radius:var(--r);padding:24px;margin-bottom:20px;background:var(--ai);color:#fff;position:relative;overflow:hidden;}
    .profile-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 10% 20%,rgba(244,184,203,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 80%,rgba(123,94,167,.12) 0%,transparent 60%);}
    .profile-name{font-family:'Zen Old Mincho',serif;font-size:1.25rem;font-weight:700;margin-bottom:4px;position:relative;z-index:1;}
    .profile-email{font-size:.78rem;opacity:.55;margin-bottom:16px;position:relative;z-index:1;}
    .profile-stats{display:flex;gap:24px;position:relative;z-index:1;}
    .profile-stat__num{font-size:1.7rem;font-weight:800;line-height:1;}
    .profile-stat__label{font-size:.66rem;opacity:.55;margin-top:3px;}
    .section-heading{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .section-heading__text{font-family:'Zen Old Mincho',serif;font-size:1.05rem;font-weight:700;color:var(--ai);white-space:nowrap;}
    .section-heading__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
    .tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--shiro-2);padding:4px;border-radius:var(--rs);overflow-x:auto;}
    .tab-btn{flex:1;min-width:fit-content;padding:9px 14px;border:none;background:none;font-size:.78rem;font-weight:700;color:var(--ai-soft);cursor:pointer;border-radius:7px;transition:all .2s;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
    .tab-btn.active{background:#fff;color:var(--ai);box-shadow:var(--shadow);}
    .tab-btn.tab-logout{color:var(--aki)!important;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:.83rem;}
    th{padding:10px 12px;text-align:left;color:var(--ai-soft);font-weight:700;border-bottom:2px solid var(--shiro-2);white-space:nowrap;font-size:.75rem;letter-spacing:.04em;}
    td{padding:11px 12px;border-bottom:1px solid var(--shiro-2);}
    tr:hover>td{background:rgba(42,74,127,.025);}
    .survey-form{background:linear-gradient(135deg,rgba(244,184,203,.1),rgba(42,74,127,.05));border:1px solid rgba(244,184,203,.28);border-radius:var(--rs);padding:16px;margin-bottom:12px;}
    .survey-form h4{font-family:'Zen Old Mincho',serif;font-size:.9rem;font-weight:700;color:var(--ai);margin-bottom:10px;}
    .star-rating{display:flex;gap:4px;margin-bottom:10px;flex-direction:row-reverse;justify-content:flex-end;}
    .star-rating input{display:none;}
    .star-rating label{font-size:1.8rem;cursor:pointer;color:#e5e7eb;transition:color .15s;}
    .star-rating input:checked ~ label,.star-rating label:hover,.star-rating label:hover ~ label{color:#f59e0b;}
    .survey-done{background:rgba(78,114,82,.08);border:1px solid rgba(78,114,82,.2);border-radius:var(--rs);padding:12px 16px;font-size:.8rem;color:var(--matcha);margin-bottom:10px;}
    .star-display{color:#f59e0b;font-size:.95rem;}
 
    /* QRモーダル */
    .modal-overlay{position:fixed;inset:0;background:rgba(26,39,68,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .modal{background:#fff;border-radius:20px;padding:30px;max-width:380px;width:100%;box-shadow:var(--shadow-lg);animation:modalIn .3s cubic-bezier(.34,1.56,.64,1);}
    @keyframes modalIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
    .modal__title{font-family:'Zen Old Mincho',serif;font-size:1.05rem;font-weight:700;color:var(--ai);margin-bottom:4px;}
    .modal__sub{font-size:.78rem;color:var(--ai-soft);margin-bottom:20px;}
    .modal__close{display:block;margin:18px auto 0;padding:9px 30px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ai-mid);font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
    .modal__close:hover{background:var(--ai);color:#fff;border-color:var(--ai);}
 
    @media(max-width:600px){
      .event-grid{grid-template-columns:1fr;}
      main{padding:22px 14px;}
      .card{padding:20px;}
      .auth-card{padding:30px 22px;}
      .header{padding:0 16px;}
    }
  </style>
</head>
<body>
<div class="indigo-pattern"></div>
<div class="seasons-bg" id="seasons-bg"></div>
<div class="season-bar"></div>
 
<header class="header">
  <div class="header__logo" onclick="goHome()">
    <div class="header__logo-mark">c+a</div>
    <span class="header__logo-text">connec<span>+</span>a</span>
  </div>
  <div class="header__right">
    <select class="lang-sel" id="lang-sel" onchange="setLang(this.value)">
      <option value="ja">日本語</option><option value="en">English</option><option value="zh">中文</option>
      <option value="ko">한국어</option><option value="es">Español</option><option value="fr">Français</option>
      <option value="pt">Português</option><option value="id">Indonesia</option><option value="th">ภาษาไทย</option>
      <option value="vi">Tiếng Việt</option><option value="ar">العربية</option><option value="hi">हिन्दी</option>
      <option value="de">Deutsch</option><option value="it">Italiano</option><option value="ru">Русский</option>
    </select>
    <button class="header__btn" id="btn-login" onclick="showPage('page-auth')" data-i18n="login">ログイン</button>
    <button class="avatar-btn" id="avatar-btn" onclick="showMyPage()" title="My Page">
      <span id="avatar-initial">U</span>
      <span class="avatar-badge" id="avatar-badge"></span>
    </button>
  </div>
</header>
 
<!-- QRモーダル -->
<div class="modal-overlay" id="qr-modal" style="display:none;" onclick="closeQRModal(event)">
  <div class="modal">
    <div class="modal__title" id="qr-modal-title"></div>
    <div class="modal__sub" id="qr-modal-sub"></div>
    <div id="qr-modal-canvas" style="display:flex;justify-content:center;margin-bottom:12px;"></div>
    <div class="ticket__id" id="qr-modal-id" style="display:block;text-align:center;margin-bottom:4px;"></div>
    <button class="modal__close" onclick="document.getElementById('qr-modal').style.display='none'" data-i18n="close">閉じる</button>
  </div>
</div>
 
<!-- 認証画面 -->
<div id="page-auth" class="page active">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-mark">c+a</div>
        <div class="auth-logo-name">connec+a</div>
        <div class="auth-logo-sub">Event Platform</div>
      </div>
      <div class="auth-welcome">
        <div class="auth-welcome__title" data-i18n="welcomeTitle">ようこそ、connec+a へ</div>
        <div class="auth-welcome__desc" data-i18n="welcomeDesc">イベントへの参加登録・管理ができるプラットフォームです</div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')" data-i18n="login">ログイン</button>
        <button class="auth-tab" onclick="switchAuthTab('register')" data-i18n="newRegister">新規登録</button>
      </div>
      <div id="auth-login" class="auth-panel active">
        <div id="login-alert"></div>
        <div class="form-group">
          <label class="form-label" data-i18n="emailLabel">メールアドレス</label>
          <input id="login-email" class="form-control" type="email" data-i18n-ph="emailPlaceholder" placeholder="example@email.com">
        </div>
        <button class="btn btn-ai btn-full btn-lg" onclick="requestLink('login')" data-i18n="sendLoginLink">ログインリンクを送信</button>
        <p style="font-size:.75rem;color:var(--ai-soft);text-align:center;margin-top:12px;line-height:1.7;" data-i18n="loginNote">登録済みのメールアドレスに個人専用リンクを送信します</p>
      </div>
      <div id="auth-register" class="auth-panel">
        <div id="register-alert"></div>
        <div class="form-group">
          <label class="form-label" data-i18n="nameLabel">お名前</label>
          <input id="register-name" class="form-control" type="text" data-i18n-ph="namePlaceholder" placeholder="山田 太郎">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="emailLabel">メールアドレス</label>
          <input id="register-email" class="form-control" type="email" data-i18n-ph="emailPlaceholder" placeholder="example@email.com">
        </div>
        <button class="btn btn-ai btn-full btn-lg" onclick="requestLink('register')" data-i18n="sendRegisterLink">登録してリンクを送信</button>
        <p style="font-size:.75rem;color:var(--ai-soft);text-align:center;margin-top:12px;line-height:1.7;" data-i18n="registerNote2">個人専用のログインリンクをメールでお送りします</p>
      </div>
      <div id="auth-sent" class="auth-panel">
        <div class="sent-box">
          <div class="icon-mark">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <h3 data-i18n="sentTitle">リンクを送信しました</h3>
          <p data-i18n="sentDesc">以下のメールアドレスに個人専用ログインリンクを送信しました。</p>
          <div class="sent-email" id="sent-email-display"></div>
          <p style="margin-top:12px;" data-i18n="sentNote">メールを確認して、リンクをクリックしてください。</p>
          <p style="margin-top:8px;font-size:.78rem;color:var(--aki);" data-i18n="sentPrivacy">このリンクはあなた専用です。他の人と共有しないでください。</p>
        </div>
        <button class="btn btn-outline btn-full" onclick="switchAuthTab('login')" style="margin-top:16px;" data-i18n="backToLogin">戻る</button>
      </div>
    </div>
  </div>
</div>
 
<!-- マイページ（ホーム）＋イベント一覧 -->
<div id="page-mypage" class="page">
  <main><div class="container">
    <div style="max-width:540px;margin:0 auto 36px;">
      <div class="profile-card" id="profile-card"></div>
      <div class="card">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchMyTab('history',this)" data-i18n="historyTab">参加履歴</button>
          <button class="tab-btn" id="survey-tab-btn" onclick="switchMyTab('survey',this)" data-i18n="surveyTab" style="display:none;">満足度調査</button>
          <button class="tab-btn" onclick="switchMyTab('profile',this)" data-i18n="profileTab">プロフィール</button>
          <button class="tab-btn tab-logout" onclick="logout()" data-i18n="logout">ログアウト</button>
        </div>
        <div id="my-history"></div>
        <div id="my-survey" style="display:none;"></div>
        <div id="my-profile" style="display:none;"></div>
      </div>
    </div>
    <div class="section-heading">
      <span class="section-heading__text" data-i18n="eventsSection">イベント一覧</span>
      <span class="section-heading__line"></span>
    </div>
    <div id="mypage-event-list"><div class="spinner"></div><p class="loading-text" data-i18n="loading">読み込み中</p></div>
  </div></main>
</div>
 
<!-- 参加登録 -->
<div id="page-register" class="page">
  <main><div class="container-sm">
    <button class="btn btn-outline" onclick="showPage('page-mypage');loadHomeData();" style="margin-bottom:18px;" data-i18n="backToList">← 一覧に戻る</button>
    <div id="reg-event-info"></div>
    <div class="card">
      <h2 class="card-title" data-i18n="registerTitle">参加登録</h2>
      <div id="reg-alert"></div>
      <div id="reg-form">
        <div class="form-group"><label class="form-label" data-i18n="nameLabel">お名前</label><input id="inp-name" class="form-control" type="text" readonly style="background:var(--shiro-2);cursor:default;"></div>
        <div class="form-group"><label class="form-label" data-i18n="emailLabel">メールアドレス</label><input id="inp-email" class="form-control" type="email" readonly style="background:var(--shiro-2);cursor:default;"></div>
        <div id="payment-info"></div>
        <button id="btn-submit" class="btn btn-ai btn-full btn-lg" data-i18n="registerBtn">登録する</button>
        <p style="font-size:.72rem;color:var(--ai-soft);text-align:center;margin-top:12px;" data-i18n="registerNote">登録後、QRチケットをメールでお送りします</p>
      </div>
      <div id="reg-result" style="display:none;"></div>
    </div>
  </div></main>
</div>

function setLang(l){currentLang=l;localStorage.setItem('lang',l);document.getElementById('lang-sel').value=l;applyI18n();}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.dataset.i18nPh);});}

async function api(action,params){params=params||{};const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(Object.assign({action},params))});const json=await res.json();if(!json.success)throw new Error(json.error||'Error');return json.data;}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
 
function initSeasons(){const bg=document.getElementById('seasons-bg');const items=[...Array.from({length:6},(_,i)=>({t:'petal',sym:'🌸',l:(i*16+4)+'%',d:(8+i*1.2)+'s',dl:(i*1.8)+'s'})),...Array.from({length:5},(_,i)=>({t:'hotaru',l:(i*18+3)+'%',tp:(i*12+25)+'%',d:(4+i)+'s',dl:(i*2)+'s'})),...Array.from({length:5},(_,i)=>({t:'momiji',sym:['🍁','🍂'][i%2],l:(i*18+5)+'%',d:(7+i*1.1)+'s',dl:(i*2+1)+'s'})),...Array.from({length:8},(_,i)=>({t:'yuki',l:(i*11+1)+'%',sz:(3+i%3)+'px',d:(5+i*0.7)+'s',dl:(i*0.8)+'s'}))];items.forEach(item=>{const el=document.createElement('div');if(item.t==='petal'||item.t==='momiji'){el.className=item.t;el.textContent=item.sym;el.style.cssText=`left:${item.l};animation-duration:${item.d};animation-delay:${item.dl};`;}else if(item.t==='hotaru'){el.className='hotaru';el.style.cssText=`left:${item.l};top:${item.tp};animation-duration:${item.d};animation-delay:${item.dl};`;}else{el.className='yuki';el.style.cssText=`left:${item.l};width:${item.sz};height:${item.sz};animation-duration:${item.d};animation-delay:${item.dl};`;}bg.appendChild(el);});}
initSeasons();

}

function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('auth-'+tab).classList.add('active');
  document.querySelectorAll('.auth-tab').forEach(b=>{const oc=b.getAttribute('onclick');if(oc&&oc.includes("'"+tab+"'"))b.classList.add('active');});
}
 
async function requestLink(mode){
  const alertEl=document.getElementById(mode+'-alert');alertEl.innerHTML='';
  const email=document.getElementById(mode+'-email').value.trim();
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alertEl.innerHTML='<div class="alert alert-danger">'+t('invalidEmail')+'</div>';return;}
  let name='';
  if(mode==='register'){name=document.getElementById('register-name').value.trim();if(!name){alertEl.innerHTML='<div class="alert alert-danger">'+t('nameRequired')+'</div>';return;}}
  const btn=document.querySelector('#auth-'+mode+' .btn-ai');
  btn.disabled=true;btn.textContent=t('sending');
  try{
    await api('requestMagicLink',{email,name,siteUrl:SITE_URL});
    document.getElementById('sent-email-display').textContent=email;
    switchAuthTab('sent');
  }catch(err){
    if(err.message==='NAME_REQUIRED')alertEl.innerHTML='<div class="alert alert-warning">'+t('emailNotFound')+'</div>';
    else alertEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';
  }
  btn.disabled=false;btn.textContent=mode==='login'?t('sendLoginLink'):t('sendRegisterLink');
}
 
['login-email','register-email','register-name'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter'){const m=id.startsWith('login')?'login':'register';requestLink(m);}});
});
 
async function verifyTokenAndLogin(token,pendingSurveyId){
  showPage('page-auth');
  const sentPanel=document.getElementById('auth-sent');
  sentPanel.innerHTML='<div class="sent-box"><div class="spinner" style="margin:20px auto;"></div><p>'+t('verifyingToken')+'</p></div>';
  switchAuthTab('sent');
  try{
    const participant=await api('verifyToken',{token});
    currentUser=participant;sessionStorage.setItem('auth_user',JSON.stringify(participant));
    updateHeader(participant);
    showPage('page-mypage');await loadHomeData();
    const surveyTarget=pendingSurveyId||sessionStorage.getItem('pending_survey');
    sessionStorage.removeItem('pending_survey');
    if(surveyTarget){const btn=document.getElementById('survey-tab-btn');if(btn){switchMyTab('survey',btn);setTimeout(()=>{const f=document.getElementById('sf-'+surveyTarget);if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},600);}}
  }catch(err){
    const isExpired=err.message==='TOKEN_EXPIRED';
    sentPanel.innerHTML='<div class="sent-box"><div style="font-size:2rem;margin-bottom:14px;color:var(--aki);">&#9888;</div><h3>'+(isExpired?t('tokenExpired'):t('authError'))+'</h3><p>'+(isExpired?t('tokenExpiredDesc'):t('authErrorDesc'))+'</p></div><button class="btn btn-outline btn-full" onclick="switchAuthTab(\'login\')" style="margin-top:16px;">'+t('backToLogin')+'</button>';
  }
}
 
function logout(){
  currentUser=null;myRegistrations=[];sessionStorage.removeItem('auth_user');
  updateHeader(null);
  showPage('page-auth');
}
 
(async function init(){
  applyI18n();
  const params=new URLSearchParams(location.search);
  const token=params.get('token');const surveyId=params.get('survey');
  if(token){history.replaceState(null,'',location.pathname);await verifyTokenAndLogin(token,surveyId);return;}
  if(surveyId){
    history.replaceState(null,'',location.pathname);
    const saved=sessionStorage.getItem('auth_user');
    if(saved){try{currentUser=JSON.parse(saved);updateHeader(currentUser);await loadMyPageData();showPage('page-mypage');const btn=document.getElementById('survey-tab-btn');if(btn){switchMyTab('survey',btn);setTimeout(()=>{const f=document.getElementById('sf-'+surveyId);if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},500);}return;}catch(e){sessionStorage.clear();}}
    sessionStorage.setItem('pending_survey',surveyId);showPage('page-auth');return;
  }
  const saved=sessionStorage.getItem('auth_user');
  if(saved){try{currentUser=JSON.parse(saved);updateHeader(currentUser);showPage('page-mypage');await loadHomeData();return;}catch(e){sessionStorage.clear();}}
  updateHeader(null);
  showPage('page-auth');
})();

async function loadEvents(){
  const listEl=document.getElementById('mypage-event-list');
  if(!listEl)return;
  listEl.innerHTML='<div class="spinner"></div><p class="loading-text">'+t('loading')+'</p>';
  try{
    const [events,allRegs]=await Promise.all([api('getEvents'),currentUser?api('getAllRegistrations',{}):Promise.resolve([])]);
    myRegistrations=currentUser?allRegs.filter(r=>r.ParticipantID===currentUser.ParticipantID):[];
    if(!events||!events.length){listEl.innerHTML='<div class="alert alert-info">'+t('noHistory')+'</div>';return;}
    const grid=document.createElement('div');grid.className='event-grid';
    events.forEach((ev,i)=>{
      const isFull=Number(ev.registrationCount||0)>=Number(ev.Capacity);
      const myReg=myRegistrations.find(r=>r.EventID===ev.EventID);
      const isChecked=myReg&&(myReg.CheckinStatus===true||myReg.CheckinStatus==='TRUE'||myReg.CheckinStatus==='true');
      const si=i%4;const card=document.createElement('div');card.className='event-card';
      let badgeHtml='';
      if(myReg){badgeHtml='<div class="reg-badge'+(isChecked?' checked':'')+'">'+(isChecked?'&#10003; '+t('checkedIn'):'&#10003; '+t('registered'))+'</div>';}
      let actionBtn='';
      if(myReg){actionBtn='<button class="btn btn-green btn-full" onclick="openQRModal(\''+esc(ev.EventName)+'\',\''+esc(ev.Date)+'\',\''+esc(myReg.QR||'')+'\',\''+esc(myReg.RegistrationID)+'\')">'+t('showQR')+'</button>';}
      else if(isFull){actionBtn='<div class="btn btn-outline btn-full" style="cursor:default;opacity:.45;">'+t('full')+'</div>';}
      else if(currentUser){actionBtn='<button class="btn '+SEASON_BTNS[si]+' btn-full reg-btn">'+t('registerBtn')+' &rarr;</button>';}
      else{actionBtn='<button class="btn '+SEASON_BTNS[si]+' btn-full login-btn">'+t('login')+' &rarr;</button>';}
      card.innerHTML=
        '<div class="event-card__visual">'+badgeHtml+'<span class="event-card__visual-label">'+SEASON_LABELS[si]+'</span></div>'+
        '<div class="event-card__body">'+
          '<div class="event-card__tag">connec+a event</div>'+
          '<div class="event-card__name">'+esc(ev.EventName)+'</div>'+
          '<div class="event-card__date">'+esc(ev.Date)+'</div>'+
          '<div class="event-card__meta">'+
            '<div class="event-card__row"><span class="event-card__label">'+t('venue')+'</span><span class="event-card__value">'+esc(ev.Location)+'</span></div>'+
            '<div class="event-card__row"><span class="event-card__label">'+t('price')+'</span><span class="event-card__value">'+formatPrice(ev.Price,ev.PaymentType)+'</span></div>'+
            (!myReg?'<div class="event-card__row"><span class="event-card__label">'+t('seats')+'</span><span class="event-card__value">'+(isFull?'<span class="badge badge-full">'+t('full')+'</span>':(Number(ev.Capacity)-Number(ev.registrationCount||0))+' seats')+'</span></div>':'')+
          '</div>'+actionBtn+'</div>';
      if(!myReg&&!isFull&&currentUser)card.querySelector('.reg-btn').addEventListener('click',()=>showRegisterPage(ev,i));
      if(!currentUser&&card.querySelector('.login-btn'))card.querySelector('.login-btn').addEventListener('click',()=>showPage('page-auth'));
      grid.appendChild(card);
    });
    listEl.innerHTML='';listEl.appendChild(grid);
    if(currentUser){try{const surveys=await api('getMySurveys',{participantId:currentUser.ParticipantID});const unans=surveys.filter(s=>!s.Rating||s.Rating==='');document.getElementById('avatar-badge').style.display=unans.length>0?'block':'none';}catch(e){}}
  }catch(err){listEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';}
}
 
function openQRModal(eventName,eventDate,qrData,regId){
  document.getElementById('qr-modal-title').textContent=eventName;
  document.getElementById('qr-modal-sub').textContent=eventDate;
  document.getElementById('qr-modal-id').textContent=qrData;

  if(qrData){new QRCode(canvas,{text:qrData,width:200,height:200,colorDark:'#1a2744',colorLight:'#f8f9fc'});}

function closeQRModal(e){if(e.target===document.getElementById('qr-modal'))document.getElementById('qr-modal').style.display='none';}

  if(!currentUser){showPage('page-auth');return;}

  document.getElementById('reg-event-info').innerHTML='<div class="event-hero '+EH_CLASS[si]+'"><div class="event-hero__name">'+esc(ev.EventName)+'</div><div class="event-hero__meta">'+esc(ev.Date)+'&emsp;'+esc(ev.Location)+'&emsp;'+(Number(ev.Price)===0?t('free'):'¥'+Number(ev.Price).toLocaleString())+'</div></div>';

  }

async function loadMyPageData(){
  if(!currentUser)return;
  try{
    const participants=await api('getParticipants',{query:currentUser.Email});
    if(participants&&participants.length){
      const fresh=participants.find(p=>p.Email===currentUser.Email)||participants[0];
      currentUser=Object.assign({},currentUser,{TotalEvents:fresh.TotalEvents,Rank:fresh.Rank,Name:fresh.Name});
      sessionStorage.setItem('auth_user',JSON.stringify(currentUser));
    }
  }catch(e){console.warn(e);}
  const p=currentUser;
  document.getElementById('profile-card').innerHTML=
    '<div class="profile-name">'+esc(p.Name)+'</div>'+
    '<div class="profile-email">'+esc(p.Email)+'</div>'+
    '<div class="profile-stats">'+
      '<div class="profile-stat"><div class="profile-stat__num">'+esc(p.TotalEvents||0)+'</div><div class="profile-stat__label">'+t('participations')+'</div></div>'+
      '<div class="profile-stat"><div class="profile-stat__num">'+esc(p.Rank||'New')+'</div><div class="profile-stat__label">'+t('rank')+'</div></div>'+
    '</div>';
  try{
    const [stats,mySurveys]=await Promise.all([api('getStats'),api('getMySurveys',{participantId:p.ParticipantID})]);
    const events=stats.eventStats||[];
    const allRegs=await api('getAllRegistrations',{});
    const myRegs=allRegs.filter(r=>r.ParticipantID===p.ParticipantID);
    const checked=myRegs.filter(r=>r.CheckinStatus===true||r.CheckinStatus==='TRUE'||r.CheckinStatus==='true');
    const histEl=document.getElementById('my-history');
    if(!checked.length){histEl.innerHTML='<div class="alert alert-info">'+t('noHistory')+'</div>';}
    else{
      let h='<div class="table-wrap"><table><thead><tr><th>Event</th><th>Date</th><th></th></tr></thead><tbody>';
      checked.forEach(r=>{const ev=events.find(e=>e.EventID===r.EventID);h+='<tr><td><strong>'+esc(ev?ev.EventName:r.EventID)+'</strong></td><td style="font-size:.78rem;">'+esc(ev?ev.Date:'—')+'</td><td>'+t('participated')+'</td></tr>';});
      h+='</tbody></table></div>';histEl.innerHTML=h;
    }
    const unanswered=mySurveys.filter(s=>!s.Rating||s.Rating==='');
    if(mySurveys.length>0){
      document.getElementById('survey-tab-btn').style.display='block';
      renderMySurveys(mySurveys,p.ParticipantID);
      if(unanswered.length>0){document.getElementById('survey-tab-btn').textContent=t('surveyTab')+' ('+unanswered.length+')';}
      document.getElementById('avatar-badge').style.display=unanswered.length>0?'block':'none';
    }
  }catch(err){console.error(err);}
}
 
function switchMyTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  ['my-history','my-survey','my-profile'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('my-'+tab).style.display='block';
  if(btn)btn.classList.add('active');
  if(tab==='profile')renderProfileEdit();
}
 
function renderMySurveys(surveys,participantId){
  const surveyEl=document.getElementById('my-survey');
  if(!surveys||!surveys.length){surveyEl.innerHTML='<div class="alert alert-info">'+t('noSurveys')+'</div>';return;}
  let html='';
  surveys.forEach(s=>{
    if(s.Rating&&Number(s.Rating)>0){
      html+='<div class="survey-done"><div style="font-weight:700;margin-bottom:4px;">'+esc(s.EventName)+'</div><div class="star-display">'+'★'.repeat(Number(s.Rating))+'☆'.repeat(5-Number(s.Rating))+'  '+s.Rating+'/5</div>'+(s.Comment?'<div style="margin-top:3px;font-size:.8rem;color:var(--ai-mid);">'+esc(s.Comment)+'</div>':'')+'</div>';
    }else{
      const sid='srv_'+s.SurveyID;
      html+='<div class="survey-form" id="sf-'+esc(s.SurveyID)+'"><h4>'+esc(s.EventName)+'　'+t('surveyTitle')+'</h4><div class="star-rating">';
      for(let i=5;i>=1;i--)html+='<input type="radio" id="'+sid+'_'+i+'" name="'+sid+'" value="'+i+'"><label for="'+sid+'_'+i+'">★</label>';
      html+='</div><textarea id="cmt-'+esc(s.SurveyID)+'" class="form-control" rows="2" placeholder="'+t('surveyCommentPlaceholder')+'" style="margin-bottom:8px;resize:none;"></textarea><button class="btn btn-ai btn-full" onclick="submitSurveyForm(\''+esc(s.SurveyID)+'\',\''+esc(s.EventID)+'\',\''+esc(participantId)+'\')">'+t('surveySubmit')+'</button></div>';
    }
  });
  surveyEl.innerHTML=html;
}
 
async function submitSurveyForm(surveyId,eventId,participantId){
  const ratingEl=document.querySelector('input[name="srv_'+surveyId+'"]:checked');
  if(!ratingEl){alert(t('surveyRatingRequired'));return;}
  const rating=ratingEl.value;const comment=document.getElementById('cmt-'+surveyId).value.trim();
  try{
    await api('submitSurvey',{surveyId,eventId,participantId,rating,comment});
    const formEl=document.getElementById('sf-'+surveyId);
    if(formEl)formEl.outerHTML='<div class="survey-done">'+t('surveyThanks')+'<br><span class="star-display">'+'★'.repeat(Number(rating))+'☆'.repeat(5-Number(rating))+'</span></div>';
    document.getElementById('avatar-badge').style.display='none';
  }catch(err){alert(esc(err.message));}
}
 
function renderProfileEdit(){
  if(!currentUser)return;
  const p=currentUser;
  document.getElementById('my-profile').innerHTML=
    '<div id="profile-edit-alert"></div>'+
    '<div class="form-group"><label class="form-label">'+t('nameLabel')+'</label><input id="edit-name" class="form-control" type="text" value="'+esc(p.Name||'')+'"></div>'+
    '<div class="form-group"><label class="form-label">'+t('emailLabel')+'</label><input id="edit-email" class="form-control" type="email" value="'+esc(p.Email||'')+'"><p style="font-size:.72rem;color:var(--ai-soft);margin-top:5px;line-height:1.6;">'+t('emailChangeNote')+'</p></div>'+
    '<div class="form-group"><label class="form-label">'+t('langLabel')+'</label>'+
    '<select id="edit-lang" class="form-control" onchange="setLang(this.value)">'+
    ['ja','en','zh','ko','es','fr','pt','id','th','vi','ar','hi','de','it','ru'].map(l=>'<option value="'+l+'"'+(currentLang===l?' selected':'')+'>'+{'ja':'日本語','en':'English','zh':'中文','ko':'한국어','es':'Español','fr':'Français','pt':'Português','id':'Indonesia','th':'ภาษาไทย','vi':'Tiếng Việt','ar':'العربية','hi':'हिन्दी','de':'Deutsch','it':'Italiano','ru':'Русский'}[l]+'</option>').join('')+
    '</select></div>'+
    '<button class="btn btn-ai btn-full" onclick="saveProfileEdit()">'+t('saveProfile')+'</button>';
}
 
async function saveProfileEdit(){
  const alertEl=document.getElementById('profile-edit-alert');alertEl.innerHTML='';
  const newName=document.getElementById('edit-name').value.trim();
  const newEmail=document.getElementById('edit-email').value.trim();
  if(!newName){alertEl.innerHTML='<div class="alert alert-danger">'+t('nameRequired')+'</div>';return;}
  if(!newEmail||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){alertEl.innerHTML='<div class="alert alert-danger">'+t('invalidEmail')+'</div>';return;}
  const btn=document.querySelector('#my-profile .btn-ai');btn.disabled=true;btn.textContent=t('saving');
  try{
    const updated=await api('updateParticipantProfile',{participantId:currentUser.ParticipantID,name:newName,email:newEmail});
    currentUser=Object.assign({},currentUser,{Name:updated.Name||newName,Email:updated.Email||newEmail});
    sessionStorage.setItem('auth_user',JSON.stringify(currentUser));
    document.getElementById('avatar-initial').textContent=currentUser.Name.charAt(0).toUpperCase();
    document.getElementById('profile-card').querySelector('.profile-name').textContent=currentUser.Name;
    document.getElementById('profile-card').querySelector('.profile-email').textContent=currentUser.Email;
    alertEl.innerHTML='<div class="alert alert-success">'+t('profileSaved')+'</div>';
  }catch(err){alertEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';}
  btn.disabled=false;btn.textContent=t('saveProfile');
}
</script>
</body>
</html>
