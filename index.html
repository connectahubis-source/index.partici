<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>connec+a</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ink:#1c2340;--ink-mid:#2a3d7a;--ink-soft:#5a6a9a;--ink-pale:#c4ceec;
      --bg:#f7f8fc;--bg2:#eef0f8;--white:#ffffff;
      --rose:#e8a0b8;--violet:#7060a8;--amber:#c85a20;--sky:#7aa8cc;
      --green:#3d6640;--gold:#a8842c;
      --border:rgba(42,61,122,.12);
      --s1:0 2px 12px rgba(28,35,64,.07);
      --s2:0 6px 28px rgba(28,35,64,.12);
      --s3:0 16px 48px rgba(28,35,64,.18);
      --r:16px;--rs:10px;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;line-height:1.6;}

    /* ── BACKGROUND ── */
    .bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(232,160,184,.16) 0%,transparent 55%),
                 radial-gradient(ellipse 60% 50% at 90% 100%,rgba(122,168,204,.14) 0%,transparent 55%),var(--bg);}
    .bg-noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
    .petals{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .petal{position:absolute;opacity:0;animation:petalFall linear infinite;}
    @keyframes petalFall{0%{transform:translateY(-10px) rotate(0deg);opacity:0;}6%{opacity:.4;}94%{opacity:.2;}100%{transform:translateY(105vh) rotate(600deg) translateX(30px);opacity:0;}}

    /* ── SEASON BAR ── */
    .season-bar{height:3px;background:linear-gradient(90deg,var(--rose) 0%,var(--violet) 33%,var(--amber) 66%,var(--sky) 100%);position:relative;z-index:101;}

    /* ── HEADER ── */
    .header{position:sticky;top:0;z-index:100;background:rgba(247,248,252,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
    .logo{display:flex;align-items:center;gap:9px;cursor:pointer;}
    .logo-icon{width:30px;height:30px;background:var(--ink);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:.55rem;color:#fff;font-weight:700;}
    .logo-name{font-family:'Noto Serif JP',serif;font-size:.95rem;color:var(--ink);font-weight:700;letter-spacing:.06em;}
    .logo-name span{color:var(--violet);}
    .header-right{display:flex;align-items:center;gap:8px;}
    .lang-sel{padding:4px 9px;border-radius:99px;font-size:.7rem;border:1.5px solid var(--border);background:transparent;color:var(--ink-mid);cursor:pointer;outline:none;font-family:'Noto Sans JP',sans-serif;transition:border-color .2s;}
    .lang-sel:hover{border-color:var(--ink-mid);}
    .avatar-btn{width:32px;height:32px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:.72rem;color:#fff;font-weight:700;transition:transform .2s,box-shadow .2s;position:relative;}
    .avatar-btn:hover{transform:scale(1.08);box-shadow:0 3px 12px rgba(28,35,64,.24);}
    .avatar-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#f59e0b;border-radius:50%;border:2px solid var(--bg);display:none;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(247,248,252,.96);backdrop-filter:blur(18px);border-top:1px solid var(--border);height:62px;display:flex;align-items:center;justify-content:space-around;}
    .bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;cursor:pointer;border:none;background:none;color:var(--ink-soft);font-family:'Noto Sans JP',sans-serif;border-radius:var(--rs);transition:all .2s;position:relative;}
    .bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
    .bnav-item span{font-size:.6rem;font-weight:600;letter-spacing:.03em;}
    .bnav-item.active{color:var(--violet);}
    .bnav-item.active svg{stroke:var(--violet);}
    .bnav-dot{position:absolute;top:6px;right:10px;width:7px;height:7px;background:#f59e0b;border-radius:50%;border:2px solid var(--bg);display:none;}
    .bnav-dot.show{display:block;}

    /* ── PAGE SYSTEM ── */
    .page{display:none;position:relative;z-index:2;padding-bottom:80px;}
    .page.active{display:block;animation:fadeUp .32s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    /* ── SHARED UTILS ── */
    .spinner{width:34px;height:34px;border:3px solid var(--bg2);border-top-color:var(--violet);border-radius:50%;animation:spin .8s linear infinite;margin:28px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{text-align:center;color:var(--ink-soft);font-size:.82rem;}
    .section-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
    .section-head-text{font-family:'Noto Serif JP',serif;font-size:.85rem;font-weight:700;color:var(--ink-soft);letter-spacing:.2em;text-transform:uppercase;white-space:nowrap;}
    .section-head-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
    .card{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);padding:22px;margin-bottom:16px;border:1px solid var(--border);}
    .badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.68rem;font-weight:700;}
    .badge-free{background:rgba(61,102,64,.1);color:var(--green);}
    .badge-paid{background:rgba(112,96,168,.1);color:var(--violet);}
    .badge-full{background:rgba(200,90,32,.1);color:var(--amber);}
    .badge-new{background:linear-gradient(135deg,var(--violet),var(--rose));color:#fff;}
    .badge-global{background:rgba(112,96,168,.1);color:var(--violet);}
    .badge-personal{background:rgba(232,160,184,.25);color:#c06080;}
    .alert{padding:11px 14px;border-radius:var(--rs);font-size:.82rem;margin-bottom:14px;line-height:1.7;}
    .alert-ok{background:#f0fdf4;border-left:3px solid #22c55e;color:#15803d;}
    .alert-err{background:rgba(200,90,32,.06);border-left:3px solid var(--amber);color:#7a2010;}
    .alert-info{background:rgba(112,96,168,.07);border-left:3px solid var(--violet);color:var(--ink-mid);}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:.74rem;font-weight:700;color:var(--ink-mid);margin-bottom:6px;letter-spacing:.04em;}
    .form-control{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.9rem;color:var(--ink);background:var(--bg);outline:none;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .form-control:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(112,96,168,.12);background:var(--white);}
    .form-control::placeholder{color:rgba(90,106,154,.4);}
    .form-control[readonly]{background:var(--bg2);cursor:default;}
    .btn-primary{width:100%;padding:12px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;background:var(--ink);color:#fff;box-shadow:0 4px 16px rgba(28,35,64,.2);transition:all .28s cubic-bezier(.34,1.56,.64,1);font-family:'Noto Sans JP',sans-serif;}
    .btn-primary:hover{background:var(--ink-mid);transform:translateY(-1px);}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
    .btn-back{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:.76rem;margin-bottom:14px;transition:all .18s;}
    .btn-back:hover{border-color:var(--ink-mid);color:var(--ink);}
    .pw-wrap{position:relative;}
    .pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:.7rem;padding:2px 4px;font-family:'Noto Sans JP',sans-serif;}
    .auth-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(28,35,64,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);animation:mfade .2s ease;}
    @keyframes mfade{from{opacity:0;}to{opacity:1;}}
    .modal{background:var(--white);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:var(--s3);animation:mpop .28s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;}
    @keyframes mpop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
    .modal-title{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:700;color:var(--ink);}
    .modal-close-btn{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:1.4rem;line-height:1;padding:0 4px;}
    .modal-close{display:block;margin:14px auto 0;padding:7px 26px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-mid);font-size:.8rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
    .modal-close:hover{background:var(--ink);color:#fff;border-color:var(--ink);}

    /* ── AUTH PAGES ── */
    .auth-wrap{min-height:calc(100vh - 59px);display:flex;align-items:center;justify-content:center;padding:24px 16px;}
    .auth-card{background:var(--white);border-radius:var(--r);box-shadow:var(--s3);border:1px solid var(--border);width:100%;max-width:420px;overflow:hidden;}
    .auth-card-bar{height:4px;background:linear-gradient(90deg,var(--rose),var(--violet),var(--amber),var(--sky));}
    .auth-card-body{padding:36px 36px 32px;}
    .auth-logo{text-align:center;margin-bottom:24px;}
    .auth-logo-icon{width:48px;height:48px;background:var(--ink);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:.72rem;color:#fff;font-weight:700;margin:0 auto 10px;box-shadow:0 4px 16px rgba(28,35,64,.2);}
    .auth-logo-name{font-family:'Noto Serif JP',serif;font-size:1.35rem;font-weight:700;color:var(--ink);letter-spacing:.06em;}
    .auth-logo-name span{color:var(--violet);}
    .auth-logo-sub{font-size:.68rem;color:var(--ink-soft);letter-spacing:.2em;margin-top:2px;}
    .auth-title{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:20px;text-align:center;}
    .auth-footer{text-align:center;margin-top:16px;font-size:.74rem;color:var(--ink-soft);}
    .auth-link{color:var(--violet);cursor:pointer;font-weight:700;}
    .auth-link:hover{text-decoration:underline;}

    /* ── LANDING ── */
    .hero{text-align:center;padding:52px 20px 32px;}
    .hero-label{font-size:.62rem;letter-spacing:.38em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;}
    .hero-label::before,.hero-label::after{content:'';width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--ink-pale));}
    .hero-label::after{background:linear-gradient(90deg,var(--ink-pale),transparent);}
    .hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.7rem,5vw,2.8rem);font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:12px;}
    .hero-title em{font-style:normal;color:var(--violet);}
    .hero-desc{font-size:.88rem;color:var(--ink-soft);line-height:1.9;max-width:360px;margin:0 auto 24px;}
    .season-dots{display:flex;height:4px;max-width:200px;margin:0 auto 32px;gap:3px;}
    .sd{flex:1;border-radius:99px;}
    .auth-cta{display:flex;justify-content:center;gap:12px;margin-bottom:48px;flex-wrap:wrap;}
    .btn-cta-primary{padding:12px 32px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;background:var(--ink);color:#fff;box-shadow:0 4px 16px rgba(28,35,64,.22);transition:all .25s;font-family:'Noto Sans JP',sans-serif;}
    .btn-cta-primary:hover{background:var(--ink-mid);transform:translateY(-1px);}
    .btn-cta-outline{padding:12px 32px;border-radius:99px;font-size:.9rem;font-weight:700;border:2px solid var(--ink);cursor:pointer;background:transparent;color:var(--ink);transition:all .25s;font-family:'Noto Sans JP',sans-serif;}
    .btn-cta-outline:hover{background:var(--ink);color:#fff;}
    .events-wrap{max-width:720px;margin:0 auto;padding:0 20px 80px;}
    .user-bar{max-width:680px;margin:0 auto 32px;background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--s1);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .user-bar-left{display:flex;align-items:center;gap:12px;}
    .user-bar-avatar{width:38px;height:38px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:.85rem;color:#fff;font-weight:700;flex-shrink:0;}
    .user-bar-name{font-weight:700;font-size:.9rem;color:var(--ink);}
    .user-bar-email{font-size:.72rem;color:var(--ink-soft);}
    .user-bar-right{display:flex;gap:8px;}
    .event-grid{display:flex;flex-direction:column;gap:14px;}
    .event-card{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--border);overflow:hidden;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;animation:cardIn .45s ease both;display:flex;}
    .event-card:hover{transform:translateY(-3px);box-shadow:var(--s2);}
    @keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .event-card:nth-child(1){animation-delay:.04s;}.event-card:nth-child(2){animation-delay:.08s;}.event-card:nth-child(3){animation-delay:.12s;}
    .ev-accent{width:5px;flex-shrink:0;}
    .event-card:nth-child(4n+1) .ev-accent{background:linear-gradient(180deg,var(--rose),#c06080);}
    .event-card:nth-child(4n+2) .ev-accent{background:linear-gradient(180deg,var(--violet),#402880);}
    .event-card:nth-child(4n+3) .ev-accent{background:linear-gradient(180deg,var(--amber),#803010);}
    .event-card:nth-child(4n) .ev-accent{background:linear-gradient(180deg,var(--sky),#3870a8);}
    .ev-body{padding:16px 18px;flex:1;min-width:0;}
    .ev-season{font-size:.58rem;letter-spacing:.22em;color:var(--ink-soft);text-transform:uppercase;font-weight:600;margin-bottom:3px;}
    .ev-name{font-family:'Noto Serif JP',serif;font-size:1.02rem;font-weight:700;color:var(--ink);margin-bottom:3px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ev-date{font-size:.74rem;color:var(--ink-soft);margin-bottom:10px;}
    .ev-meta{display:flex;gap:16px;flex-wrap:wrap;}
    .ev-kv{display:flex;flex-direction:column;}
    .ev-k{font-size:.66rem;color:var(--ink-soft);}
    .ev-v{font-size:.8rem;font-weight:600;color:var(--ink-mid);}
    .ev-actions{padding:14px 14px 14px 0;display:flex;align-items:center;flex-shrink:0;}
    .reg-badge{font-size:.63rem;font-weight:700;padding:4px 10px;border-radius:99px;cursor:pointer;white-space:nowrap;}
    .reg-badge-pending{background:var(--ink);color:#fff;}
    .reg-badge-checked{background:var(--green);color:#fff;}
    .btn-ev{padding:9px 16px;border-radius:99px;font-size:.76rem;font-weight:700;border:none;cursor:pointer;transition:all .22s;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
    .btn-ev:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn-ev-rose{background:linear-gradient(135deg,var(--rose),#c06080);color:#fff;}
    .btn-ev-violet{background:linear-gradient(135deg,var(--violet),#402880);color:#fff;}
    .btn-ev-amber{background:linear-gradient(135deg,var(--amber),#803010);color:#fff;}
    .btn-ev-sky{background:linear-gradient(135deg,var(--sky),#3870a8);color:#fff;}
    .btn-ev-outline{padding:8px 14px;border-radius:99px;font-size:.74rem;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);cursor:default;font-family:'Noto Sans JP',sans-serif;}

    /* ── EVENT REGISTER ── */
    .reg-wrap{max-width:480px;margin:0 auto;padding:24px 20px 80px;}
    .ev-hero-block{border-radius:var(--r);padding:18px 20px;margin-bottom:16px;}
    .ev-hero-name{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:5px;}
    .ev-hero-meta{font-size:.82rem;color:var(--ink-soft);line-height:2;}
    .ticket-box{border:1.5px dashed rgba(28,35,64,.18);border-radius:var(--r);padding:22px;text-align:center;margin:16px 0;position:relative;}
    .ticket-box::before,.ticket-box::after{content:'';position:absolute;width:18px;height:18px;background:var(--bg);border-radius:50%;top:50%;transform:translateY(-50%);border:1.5px dashed rgba(28,35,64,.18);}
    .ticket-box::before{left:-10px;}.ticket-box::after{right:-10px;}
    .ticket-label{font-family:'Noto Serif JP',serif;font-size:.7rem;font-weight:700;color:var(--ink-soft);margin-bottom:12px;letter-spacing:.18em;}
    .ticket-id{font-size:.62rem;color:var(--ink-soft);font-family:monospace;word-break:break-all;background:var(--bg2);padding:5px 9px;border-radius:6px;display:block;text-align:center;margin:6px 0;}
    .payment-box{background:rgba(112,96,168,.06);border:1px solid rgba(112,96,168,.16);border-radius:var(--rs);padding:13px;margin-bottom:13px;font-size:.82rem;}
    .payment-box h4{color:var(--ink-mid);margin-bottom:4px;font-weight:700;}
    .payment-box p{color:var(--ink-soft);line-height:1.8;}
    .btn-season-rose{width:100%;padding:12px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;background:linear-gradient(135deg,var(--rose),#c06080);color:#fff;transition:all .25s;font-family:'Noto Sans JP',sans-serif;}
    .btn-season-violet{width:100%;padding:12px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;background:linear-gradient(135deg,var(--violet),#402880);color:#fff;transition:all .25s;font-family:'Noto Sans JP',sans-serif;}
    .btn-season-amber{width:100%;padding:12px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;background:linear-gradient(135deg,var(--amber),#803010);color:#fff;transition:all .25s;font-family:'Noto Sans JP',sans-serif;}
    .btn-season-sky{width:100%;padding:12px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;background:linear-gradient(135deg,var(--sky),#3870a8);color:#fff;transition:all .25s;font-family:'Noto Sans JP',sans-serif;}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink-soft);border-radius:99px;padding:10px 20px;font-size:.86rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .18s;margin-top:10px;}
    .btn-outline:hover{border-color:var(--ink-mid);color:var(--ink);}

    /* ── NEWS PAGE ── */
    .page-inner{max-width:680px;margin:0 auto;padding:24px 20px;}
    .news-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .filter-chip{padding:6px 16px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:.74rem;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
    .filter-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
    .news-card{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--border);padding:20px;margin-bottom:12px;transition:all .25s;cursor:pointer;position:relative;overflow:hidden;animation:cardIn .4s ease both;}
    .news-card:hover{transform:translateY(-2px);box-shadow:var(--s2);}
    .news-card.unread::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--violet),var(--rose));}
    .news-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;}
    .news-card-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .news-card-date{font-size:.68rem;color:var(--ink-soft);white-space:nowrap;flex-shrink:0;}
    .news-card-title{font-family:'Noto Serif JP',serif;font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.4;}
    .news-card-body{font-size:.82rem;color:var(--ink-soft);line-height:1.8;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .news-empty{text-align:center;padding:60px 20px;color:var(--ink-soft);}
    .news-empty-icon{font-size:3rem;margin-bottom:12px;}
    /* news detail modal */
    .news-detail-title{font-family:'Noto Serif JP',serif;font-size:1.1rem;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:10px;}
    .news-detail-meta{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .news-detail-body{font-size:.88rem;color:var(--ink-soft);line-height:2;white-space:pre-wrap;word-break:break-word;}

    /* ── MY PAGE ── */
    .mypage-wrap{max-width:620px;margin:0 auto;padding:24px 20px 80px;}
    .profile-card{border-radius:var(--r);padding:22px 24px;margin-bottom:18px;background:var(--ink);color:#fff;position:relative;overflow:hidden;}
    .profile-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 70% at 5% 15%,rgba(232,160,184,.22) 0%,transparent 60%),radial-gradient(ellipse 55% 60% at 92% 85%,rgba(112,96,168,.22) 0%,transparent 60%);}
    .profile-card-z{position:relative;z-index:1;}
    .profile-name{font-family:'Noto Serif JP',serif;font-size:1.18rem;font-weight:700;margin-bottom:2px;}
    .profile-email{font-size:.75rem;opacity:.52;margin-bottom:14px;}
    .profile-stats{display:flex;gap:20px;}
    .ps-num{font-size:1.55rem;font-weight:800;line-height:1;}
    .ps-label{font-size:.62rem;opacity:.52;margin-top:2px;}
    .tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg2);padding:3px;border-radius:var(--rs);overflow-x:auto;}
    .tab-btn{flex:1;min-width:fit-content;padding:8px 12px;border:none;background:none;font-size:.76rem;font-weight:700;color:var(--ink-soft);cursor:pointer;border-radius:8px;transition:all .18s;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
    .tab-btn.active{background:var(--white);color:var(--ink);box-shadow:var(--s1);}
    .tab-logout{color:var(--amber)!important;}
    .tab-pane{display:none;}.tab-pane.active{display:block;}
    table{width:100%;border-collapse:collapse;font-size:.8rem;}
    th{padding:8px 10px;text-align:left;color:var(--ink-soft);font-weight:700;border-bottom:2px solid var(--bg2);white-space:nowrap;font-size:.7rem;letter-spacing:.04em;}
    td{padding:9px 10px;border-bottom:1px solid var(--bg2);}
    tr:hover>td{background:rgba(112,96,168,.03);}
    /* survey charts */
    .chart-wrap{position:relative;height:220px;margin-top:8px;}
    .survey-form{background:linear-gradient(135deg,rgba(232,160,184,.1),rgba(112,96,168,.07));border:1px solid rgba(232,160,184,.28);border-radius:var(--rs);padding:14px;margin-bottom:12px;}
    .survey-form h4{font-family:'Noto Serif JP',serif;font-size:.86rem;font-weight:700;color:var(--ink);margin-bottom:8px;}
    .star-rating{display:flex;gap:4px;margin-bottom:8px;flex-direction:row-reverse;justify-content:flex-end;}
    .star-rating input{display:none;}
    .star-rating label{font-size:1.65rem;cursor:pointer;color:#e0e2ec;transition:color .15s;}
    .star-rating input:checked~label,.star-rating label:hover,.star-rating label:hover~label{color:#f59e0b;}
    .survey-done{background:rgba(61,102,64,.07);border:1px solid rgba(61,102,64,.2);border-radius:var(--rs);padding:10px 14px;font-size:.78rem;color:var(--green);margin-bottom:10px;}
    .star-display{color:#f59e0b;}
    /* timeline */
    .timeline{display:flex;flex-direction:column;}
    .tl-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--bg2);}
    .tl-item:last-child{border-bottom:none;}
    .tl-left{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .tl-dot{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--rose));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .tl-dot-inner{width:8px;height:8px;border-radius:50%;background:#fff;}
    .tl-line{width:2px;flex:1;background:var(--bg2);min-height:16px;}
    .tl-body{flex:1;}
    .tl-event{font-weight:700;font-size:.88rem;color:var(--ink);margin-bottom:2px;}
    .tl-date{font-size:.72rem;color:var(--ink-soft);}
    .tl-badge-done{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.64rem;font-weight:700;background:rgba(61,102,64,.1);color:var(--green);margin-top:4px;}

    /* ── CHAT / DM ── */
    .chat-area{display:flex;flex-direction:column;height:380px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg2);}
    .chat-bubble{max-width:78%;display:flex;flex-direction:column;gap:3px;}
    .chat-bubble.mine{align-self:flex-end;align-items:flex-end;}
    .chat-bubble.theirs{align-self:flex-start;align-items:flex-start;}
    .bubble-sender{font-size:.66rem;font-weight:700;color:var(--ink-soft);margin-bottom:2px;padding:0 4px;}
    .bubble-text{padding:10px 14px;border-radius:var(--r);font-size:.88rem;line-height:1.6;word-break:break-word;}
    .chat-bubble.mine .bubble-text{background:var(--ink);color:#fff;border-radius:var(--r) var(--r) 4px var(--r);}
    .chat-bubble.theirs .bubble-text{background:var(--white);color:var(--ink);border:1px solid var(--border);border-radius:var(--r) var(--r) var(--r) 4px;}
    .bubble-meta{font-size:.62rem;color:var(--ink-soft);padding:0 4px;}
    .chat-input-row{display:flex;gap:8px;padding:10px 12px;background:var(--white);border-top:1px solid var(--border);}
    .chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:99px;font-size:.88rem;outline:none;font-family:'Noto Sans JP',sans-serif;background:var(--bg);transition:border-color .2s;resize:none;max-height:80px;}
    .chat-input:focus{border-color:var(--violet);background:var(--white);}
    .chat-send{padding:10px 18px;border-radius:99px;border:none;background:var(--ink);color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;white-space:nowrap;}
    .chat-send:hover{background:var(--ink-mid);}
    .chat-send:disabled{opacity:.4;cursor:not-allowed;}
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-soft);font-size:.85rem;gap:8px;padding:20px;}
    .chat-empty span{font-size:2.2rem;}

    /* ── PHOTO PAGE ── */
    .photo-page-wrap{max-width:720px;margin:0 auto;padding:24px 20px;}
    .event-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
    .event-chip{padding:8px 16px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:.76rem;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
    .event-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
    .photo-item{aspect-ratio:1;border-radius:var(--rs);overflow:hidden;position:relative;cursor:pointer;background:var(--bg2);border:1px solid var(--border);}
    .photo-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
    .photo-item:hover img{transform:scale(1.06);}
    .photo-overlay{position:absolute;inset:0;background:rgba(28,35,64,.42);display:none;align-items:center;justify-content:center;}
    .photo-item:hover .photo-overlay{display:flex;}
    .photo-overlay svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;}
    .upload-zone{border:2px dashed var(--ink-pale);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(112,96,168,.03);margin-bottom:16px;}
    .upload-zone:hover{border-color:var(--violet);background:rgba(112,96,168,.06);}
    .upload-icon{font-size:2.5rem;margin-bottom:8px;}
    .upload-text{font-size:.85rem;color:var(--ink-soft);line-height:1.8;}
    .upload-text strong{color:var(--violet);}
    .photo-locked{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:60px 20px;text-align:center;box-shadow:var(--s1);}
    .photo-locked-icon{font-size:3rem;margin-bottom:12px;}
    .photo-locked-text{font-size:.88rem;color:var(--ink-soft);line-height:1.9;}
    .photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;animation:mfade .2s ease;}
    .photo-viewer img{max-width:92vw;max-height:88vh;border-radius:var(--rs);object-fit:contain;}
    .photo-viewer-close{position:absolute;top:18px;right:20px;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;font-size:1.6rem;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

    /* ── QR MODAL ── */
    .qr-modal{position:fixed;inset:0;background:rgba(28,35,64,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);animation:mfade .2s ease;}

    /* ── PROFILE EDIT ── */
    #my-profile-edit{}
    .tab-logout{color:var(--amber)!important;}

    @media(max-width:600px){
      .header{padding:0 14px;}
      .auth-card-body{padding:26px 22px 24px;}
      .events-wrap,.mypage-wrap,.reg-wrap,.page-inner,.photo-page-wrap{padding-left:14px;padding-right:14px;}
      .ev-actions{display:none;}
      .photo-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
    }
  </style>
</head>

<script>
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw94iJOYloTfXOeOONgwyP3MlTXOBolUdSCFO57NyfYDr-0ISYMTLwntsQxinj5c8CsFA/exec';

// ════════════════════════════════════════════════
// API helper
// ════════════════════════════════════════════════
async function api(action, params) {
  params = params || {};
  const res = await fetch(GAS_URL, {
    method: 'POST', redirect: 'follow',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify(Object.assign({action}, params))
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'Error');
  return json.data;
}
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ════════════════════════════════════════════════
// LOCAL STORAGE stubs for News / Chat / Photos
// (GAS functions not yet deployed → use localStorage)
// ════════════════════════════════════════════════
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'null'); }catch(e){ return null; } }
function lsSet(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

// News helpers
function getNewsItems(participantId){
  const all = lsGet('connecplus_news') || [];
  return all.filter(n => !n.userId || n.userId === participantId);
}
function markNewsRead(id){
  const read = lsGet('connecplus_news_read') || [];
  if(!read.includes(id)){ read.push(id); lsSet('connecplus_news_read', read); }
}
function isNewsRead(id){
  const read = lsGet('connecplus_news_read') || [];
  return read.includes(id);
}

// Chat helpers
function getChatMessages(participantId){
  const all = lsGet('connecplus_chat') || [];
  return all.filter(m => m.senderId === participantId || m.receiverId === participantId);
}
function sendChatMessage(participantId, senderName, text){
  const all = lsGet('connecplus_chat') || [];
  const msg = {
    id: Date.now()+'_'+Math.random().toString(36).slice(2,6),
    senderId: participantId,
    receiverId: 'ADMIN',
    senderName, text,
    createdAt: new Date().toISOString(),
    isRead: false
  };
  all.push(msg);
  lsSet('connecplus_chat', all);
  return msg;
}

// Photo helpers (base64 stored)
function getPhotos(eventId){
  return (lsGet('connecplus_photos') || []).filter(p => p.eventId === eventId);
}
function addPhoto(eventId, name, dataUrl){
  const all = lsGet('connecplus_photos') || [];
  all.push({ id: Date.now(), eventId, name, url: dataUrl, uploadedAt: new Date().toISOString() });
  lsSet('connecplus_photos', all);
}
function deletePhoto(id){
  const all = (lsGet('connecplus_photos') || []).filter(p => p.id !== id);
  lsSet('connecplus_photos', all);
}

// Seed demo news if empty
(function seedDemoNews(){
  if(lsGet('connecplus_news')) return;
  lsSet('connecplus_news', [

    { id:'news2', title:'⚠️ 会場変更のお知らせ', body:'次回イベントの会場が変更になりました。新しい会場は「東京カルチャーセンター」となります。ご不便をおかけしますが、よろしくお願いいたします。', type:'global', userId:null, createdAt: new Date(Date.now()-86400000*5).toISOString() },
    { id:'news3', title:'📸 フォトギャラリー公開中', body:'先日開催したイベントのお写真をフォトページにアップロードしました。ぜひご覧ください。', type:'global', userId:null, createdAt: new Date(Date.now()-86400000*10).toISOString() },
  ]);
})();

// ════════════════════════════════════════════════

let currentLang = localStorage.getItem('lang') || 'ja';

// ════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════
let currentUser = null, currentEvent = null, currentEventIdx = 0, myRegistrations = [];
const EV_BTN  = ['btn-ev-rose','btn-ev-violet','btn-ev-amber','btn-ev-sky'];
const REG_BTN = ['btn-season-rose','btn-season-violet','btn-season-amber','btn-season-sky'];
const EV_THEME = [
  'background:linear-gradient(135deg,rgba(232,160,184,.18),rgba(137,201,122,.1));border:1px solid rgba(232,160,184,.3);',
  'background:linear-gradient(135deg,rgba(112,96,168,.14),rgba(91,163,232,.1));border:1px solid rgba(112,96,168,.22);',
  'background:linear-gradient(135deg,rgba(200,90,32,.12),rgba(232,200,74,.12));border:1px solid rgba(200,90,32,.18);',
  'background:linear-gradient(135deg,rgba(122,168,204,.2),rgba(176,40,60,.07));border:1px solid rgba(122,168,204,.28);'
];
const SEASONS = ['Spring','Summer','Autumn','Winter'];
let chartInstances = {};
let newsFilter = 'all';
let activePhotoEventId = null;

// ════════════════════════════════════════════════
// Page system
// ════════════════════════════════════════════════
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  window.scrollTo({top:0,behavior:'smooth'});
  // update bottom nav
  const map = {'page-landing':'bnav-home','page-news':'bnav-news','page-photos':'bnav-photo','page-mypage':'bnav-mypage'};
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  if(map[id]) document.getElementById(map[id])?.classList.add('active');
}

function goHome(){
  showPage('page-landing');
  loadEvents();
}

// ════════════════════════════════════════════════
// Header / Bottom nav

function updateHeader(user){

// ════════════════════════════════════════════════
// Auth
// ════════════════════════════════════════════════
function togglePw(id, btn){
  const el=document.getElementById(id);
  const show=el.type==='password';
  el.type=show?'text':'password';
  btn.textContent=show?'非表示':'表示';
}

async function doLogin(){
  const alertEl=document.getElementById('login-alert'); alertEl.innerHTML='';
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alertEl.innerHTML='<div class="alert alert-err">有効なメールアドレスを入力してください</div>';return;}
  if(!pw){alertEl.innerHTML='<div class="alert alert-err">パスワードを入力してください</div>';return;}
  const btn=document.querySelector('#page-login .btn-primary'); btn.disabled=true; btn.textContent='...';
  try{
    const user=await api('loginWithPassword',{email,password:pw});
    currentUser=user; sessionStorage.setItem('auth_user',JSON.stringify(user));
    updateHeader(user); showPage('page-landing'); await loadEvents();
  }catch(err){
    alertEl.innerHTML='<div class="alert alert-err">'+(err.message==='INVALID_CREDENTIALS'?'メールアドレスまたはパスワードが正しくありません':esc(err.message))+'</div>';
  }
  btn.disabled=false; btn.textContent='ログイン';
}

async function doRegister(){
  const alertEl=document.getElementById('reg-account-alert'); alertEl.innerHTML='';
  const name=document.getElementById('ra-name').value.trim();
  const email=document.getElementById('ra-email').value.trim();
  const pw=document.getElementById('ra-pw').value;
  const pw2=document.getElementById('ra-pw2').value;
  if(!name){alertEl.innerHTML='<div class="alert alert-err">お名前を入力してください</div>';return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alertEl.innerHTML='<div class="alert alert-err">有効なメールアドレスを入力してください</div>';return;}
  if(!pw||pw.length<8){alertEl.innerHTML='<div class="alert alert-err">パスワードは8文字以上で入力してください</div>';return;}
  if(pw!==pw2){alertEl.innerHTML='<div class="alert alert-err">パスワードが一致しません</div>';return;}
  const btn=document.querySelector('#page-register-account .btn-primary'); btn.disabled=true; btn.textContent='...';
  try{
    const user=await api('registerWithPassword',{name,email,password:pw});
    currentUser=user; sessionStorage.setItem('auth_user',JSON.stringify(user));
    updateHeader(user); showPage('page-landing'); await loadEvents();
  }catch(err){
    alertEl.innerHTML='<div class="alert alert-err">'+(err.message==='EMAIL_EXISTS'?'このメールアドレスはすでに登録されています':esc(err.message))+'</div>';
  }
  btn.disabled=false; btn.textContent='アカウントを作成';
}

function logout(){
  currentUser=null; myRegistrations=[];
  sessionStorage.removeItem('auth_user');
  updateHeader(null); showPage('page-landing'); loadEvents();
}

['login-email','login-pw'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});});
['ra-name','ra-email','ra-pw','ra-pw2'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});});

// ════════════════════════════════════════════════
// Event List
// ════════════════════════════════════════════════
function formatPrice(p,tp){
  if(tp==='FREE'||Number(p)===0) return '<span class="badge badge-free">無料</span>';
  return '<span class="badge badge-paid">¥'+Number(p).toLocaleString()+'</span>';
}

async function loadEvents(){
  const listEl=document.getElementById('event-list');
  listEl.innerHTML='<div class="spinner"></div><p class="loading-text">読み込み中</p>';
  try{
    const [events, allRegs]=await Promise.all([
      api('getEvents'),
      currentUser?api('getAllRegistrations',{}):Promise.resolve([])
    ]);
    myRegistrations=currentUser?allRegs.filter(r=>r.ParticipantID===currentUser.ParticipantID):[];
    if(!events||!events.length){listEl.innerHTML='<div class="alert alert-info">現在公開中のイベントはありません</div>';return;}
    const grid=document.createElement('div'); grid.className='event-grid';
    events.forEach((ev,i)=>{
      const isFull=Number(ev.registrationCount||0)>=Number(ev.Capacity);
      const myReg=myRegistrations.find(r=>r.EventID===ev.EventID);
      const isChecked=myReg&&(myReg.CheckinStatus===true||myReg.CheckinStatus==='TRUE'||myReg.CheckinStatus==='true');
      const si=i%4;
      const card=document.createElement('div'); card.className='event-card';
      let actHtml='';
      if(myReg){
        actHtml='<div class="ev-actions"><div class="reg-badge '+(isChecked?'reg-badge-checked':'reg-badge-pending')+'" style="cursor:pointer;">'+(isChecked?'✓ 参加済み':'✓ 登録済み')+'</div></div>';
      } else if(isFull){
        actHtml='<div class="ev-actions"><div class="btn-ev-outline">満席</div></div>';
      } else if(currentUser){
        actHtml='<div class="ev-actions"><button class="btn-ev '+EV_BTN[si]+' reg-btn">登録 →</button></div>';
      } else {
        actHtml='<div class="ev-actions"><button class="btn-ev '+EV_BTN[si]+' login-btn">ログイン →</button></div>';
      }
      card.innerHTML='<div class="ev-accent"></div><div class="ev-body"><div class="ev-season">'+SEASONS[si]+'</div><div class="ev-name">'+esc(ev.EventName)+'</div><div class="ev-date">'+esc(ev.Date)+'</div><div class="ev-meta"><div class="ev-kv"><span class="ev-k">会場</span><span class="ev-v">'+esc(ev.Location)+'</span></div><div class="ev-kv"><span class="ev-k">参加費</span><span class="ev-v">'+formatPrice(ev.Price,ev.PaymentType)+'</span></div>'+((!myReg)?'<div class="ev-kv"><span class="ev-k">残席</span><span class="ev-v">'+(isFull?'<span class="badge badge-full">満席</span>':(Number(ev.Capacity)-Number(ev.registrationCount||0))+' 席')+'</span></div>':'')+'</div></div>'+actHtml;
      if(myReg) card.querySelector('.reg-badge').addEventListener('click',()=>openQR(ev.EventName,ev.Date,myReg.QR||'',myReg.RegistrationID));
      if(!myReg&&!isFull&&currentUser) card.querySelector('.reg-btn').addEventListener('click',()=>showEventReg(ev,i));
      if(!currentUser&&card.querySelector('.login-btn')) card.querySelector('.login-btn').addEventListener('click',()=>showPage('page-login'));
      grid.appendChild(card);
    });
    listEl.innerHTML=''; listEl.appendChild(grid);
    // badge
    if(currentUser) updateBadges();
  }catch(err){listEl.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';}
}

function updateBadges(){
  if(!currentUser) return;
  const news = getNewsItems(currentUser.ParticipantID);
  const unreadNews = news.filter(n => !isNewsRead(n.id));
  document.getElementById('news-dot').classList.toggle('show', unreadNews.length>0);
  const chats = getChatMessages(currentUser.ParticipantID);
  const unreadChat = chats.filter(m => m.receiverId===currentUser.ParticipantID && !m.isRead);
  document.getElementById('chat-dot').classList.toggle('show', unreadChat.length>0);
  const avatarBadge = document.getElementById('avatar-badge');
  if(avatarBadge) avatarBadge.style.display = (unreadNews.length>0||unreadChat.length>0)?'block':'none';
}

// ════════════════════════════════════════════════
// QR Modal
// ════════════════════════════════════════════════
function openQR(name,date,qr,id){
  document.getElementById('qr-modal-title').textContent=name;
  document.getElementById('qr-modal-sub').textContent=date;
  document.getElementById('qr-modal-id').textContent=qr;
  const c=document.getElementById('qr-modal-canvas'); c.innerHTML='';
  if(qr) new QRCode(c,{text:qr,width:196,height:196,colorDark:'#1c2340',colorLight:'#f7f8fc'});
  document.getElementById('qr-modal').style.display='block';
}

// ════════════════════════════════════════════════
// Event Registration
// ════════════════════════════════════════════════
function showEventReg(ev,idx){
  if(!currentUser){showPage('page-login');return;}
  currentEvent=ev; currentEventIdx=idx;
  showPage('page-event-reg');
  const si=idx%4;
  document.getElementById('ev-reg-info').innerHTML='<div class="ev-hero-block" style="'+EV_THEME[si]+'"><div class="ev-hero-name">'+esc(ev.EventName)+'</div><div class="ev-hero-meta">'+esc(ev.Date)+'　'+esc(ev.Location)+'　'+(Number(ev.Price)===0?'無料':'¥'+Number(ev.Price).toLocaleString())+'</div></div>';
  document.getElementById('inp-name').value=currentUser.Name;
  document.getElementById('inp-email').value=currentUser.Email;
  const payEl=document.getElementById('payment-info-box'); payEl.innerHTML='';
  if(ev.PaymentType!=='FREE'){
    let h='<div class="payment-box">';
    if(ev.PaymentType==='PAYPAY'||ev.PaymentType==='PAYPAY_OR_CASH') h+='<h4>PayPay</h4><p>管理者から別途PayPayのご案内をします。</p>';
    if(ev.PaymentType==='CASH') h+='<h4>Cash</h4><p>当日受付にて現金でお支払いください。</p>';
    h+='</div>'; payEl.innerHTML=h;
  }
  document.getElementById('ev-reg-alert').innerHTML='';
  document.getElementById('ev-reg-form').style.display='block';
  document.getElementById('ev-reg-result').style.display='none';
  const btn=document.getElementById('btn-ev-submit');
  btn.className=REG_BTN[si]; btn.style.cssText='width:100%;padding:12px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .25s;';
  btn.textContent='登録する'; btn.disabled=false;
}

document.getElementById('btn-ev-submit').addEventListener('click',async()=>{
  if(!currentUser){showPage('page-login');return;}
  const alertEl=document.getElementById('ev-reg-alert'); alertEl.innerHTML='';
  const btn=document.getElementById('btn-ev-submit'); btn.disabled=true; btn.textContent='登録中...';
  try{
    const result=await api('registerParticipant',{name:currentUser.Name,email:currentUser.Email,phone:'',eventId:currentEvent.EventID});
    document.getElementById('ev-reg-form').style.display='none';
    document.getElementById('ev-reg-result').style.display='block';
    let payHtml='';
    if(result.paymentStatus==='PAYPAY_PENDING') payHtml='<div class="payment-box"><h4>PayPay</h4><p>管理者から別途PayPayのご案内をします。</p></div>';
    else if(result.paymentStatus==='CASH') payHtml='<div class="alert alert-info">当日受付にて現金でお支払いください。</div>';
    document.getElementById('ev-reg-result').innerHTML=
      '<div style="text-align:center;padding:14px 0 4px;font-size:2rem;">🎉</div>'+
      '<div class="alert alert-ok">登録完了！チケットをメールで送信しました。</div>'+
      '<div class="ticket-box"><div class="ticket-label">— QR チケット —</div>'+
      '<div id="qr-reg-canvas" style="display:flex;justify-content:center;margin:0 auto 10px;"></div>'+
      '<div class="ticket-id">'+esc(result.qrData)+'</div></div>'+payHtml+
      '<button class="btn-outline" onclick="goHome()" style="display:block;width:100%;margin-top:10px;padding:10px;text-align:center;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);cursor:pointer;font-family:\'Noto Sans JP\',sans-serif;font-size:.86rem;font-weight:700;">← 一覧に戻る</button>';
    new QRCode(document.getElementById('qr-reg-canvas'),{text:result.qrData,width:176,height:176,colorDark:'#1c2340',colorLight:'#f7f8fc'});
    myRegistrations.push({EventID:currentEvent.EventID,ParticipantID:currentUser.ParticipantID,QR:result.qrData,RegistrationID:result.registrationId,CheckinStatus:false});
  }catch(err){
    btn.disabled=false; btn.textContent='登録する';
    if(err.message==='FULL') alertEl.innerHTML='<div class="alert alert-err">満席のため登録できません。</div>';
    else if(err.message==='ALREADY_REGISTERED') alertEl.innerHTML='<div class="alert alert-info">すでに登録済みです。</div>';
    else alertEl.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';
  }
});

// ════════════════════════════════════════════════
// NEWS PAGE
// ════════════════════════════════════════════════
function showNewsPage(){
  if(!currentUser){showPage('page-login');return;}
  showPage('page-news');
  renderNews();
}

function filterNews(f, btn){
  newsFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderNews();
}

function renderNews(){
  if(!currentUser) return;
  const el = document.getElementById('news-list');
  let items = getNewsItems(currentUser.ParticipantID);
  if(newsFilter==='global') items = items.filter(n=>n.type==='global'||!n.userId);
  else if(newsFilter==='personal') items = items.filter(n=>n.userId===currentUser.ParticipantID);
  else if(newsFilter==='unread') items = items.filter(n=>!isNewsRead(n.id));
  items = items.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(!items.length){
    el.innerHTML='<div class="news-empty"><div class="news-empty-icon">📭</div><p>ニュースはありません</p></div>';
    return;
  }
  el.innerHTML = items.map((n,i)=>{
    const read = isNewsRead(n.id);
    const date = new Date(n.createdAt).toLocaleDateString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const isPersonal = n.userId && n.userId===currentUser.ParticipantID;
    return `<div class="news-card${read?'':' unread'}" onclick="openNewsDetail('${esc(n.id)}')" style="animation-delay:${i*.06}s">
      <div class="news-card-head">
        <div class="news-card-badges">
          ${!read?'<span class="badge badge-new">NEW</span>':''}
          ${isPersonal?'<span class="badge badge-personal">個別</span>':'<span class="badge badge-global">全体</span>'}
        </div>
        <span class="news-card-date">${date}</span>
      </div>
      <div class="news-card-title">${esc(n.title)}</div>
      <div class="news-card-body">${esc(n.body)}</div>
    </div>`;
  }).join('');
  updateBadges();
}

function openNewsDetail(id){
  markNewsRead(id);
  const items = getNewsItems(currentUser.ParticipantID);
  const n = items.find(x=>x.id===id);
  if(!n) return;
  const date = new Date(n.createdAt).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const isPersonal = n.userId && n.userId===currentUser.ParticipantID;
  document.getElementById('nm-title').textContent = n.title;
  document.getElementById('nm-meta').innerHTML =
    (isPersonal?'<span class="badge badge-personal">個別通知</span>':'<span class="badge badge-global">全体</span>')+
    `<span style="font-size:.74rem;color:var(--ink-soft);">${date}</span>`;
  document.getElementById('nm-body').textContent = n.body;
  document.getElementById('news-modal').style.display='flex';
  // re-render to update read state
  setTimeout(renderNews, 100);
  updateBadges();
}

// MY PAGE
// ════════════════════════════════════════════════
function showMyPage(){
  if(!currentUser){showPage('page-login');return;}
  showPage('page-mypage');
  loadMyPageData();
}

async function loadMyPageData(){
  if(!currentUser) return;
  try{
    const ps=await api('getParticipants',{query:currentUser.Email});
    if(ps&&ps.length){const f=ps.find(p=>p.Email===currentUser.Email)||ps[0]; currentUser=Object.assign({},currentUser,{TotalEvents:f.TotalEvents,Rank:f.Rank,Name:f.Name}); sessionStorage.setItem('auth_user',JSON.stringify(currentUser));}
  }catch(e){}
  const p = currentUser;
  document.getElementById('pc-name').textContent = p.Name||'';
  document.getElementById('pc-email').textContent = p.Email||'';
  document.getElementById('pc-events').textContent = p.TotalEvents||0;
  document.getElementById('pc-rank').textContent = p.Rank||'New';
  // load history tab by default
  loadHistoryTab();
}

function switchMyTab(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const pane = document.getElementById('tab-'+tab);
  if(pane) pane.classList.add('active');
  if(tab==='history') loadHistoryTab();
  else if(tab==='survey') loadSurveyTab();
  else if(tab==='notifications') loadNotificationsTab();
  else if(tab==='chat') loadChatTab();
  else if(tab==='profile-edit') renderProfileEdit();
}

// ── History Tab ──
async function loadHistoryTab(){
  const el = document.getElementById('tab-history');
  el.innerHTML='<div class="spinner"></div>';
  try{
    const [stats, allRegs] = await Promise.all([api('getStats'), api('getAllRegistrations',{})]);
    const events = stats.eventStats||[];
    const myRegs = allRegs.filter(r=>r.ParticipantID===currentUser.ParticipantID);
    const checked = myRegs.filter(r=>r.CheckinStatus===true||r.CheckinStatus==='TRUE'||r.CheckinStatus==='true');
    if(!checked.length){
      el.innerHTML='<div class="alert alert-info" style="margin-top:8px;">まだ参加履歴がありません。</div>';
      return;
    }
    el.innerHTML='<div class="timeline">'+checked.map((r,i)=>{
      const ev=events.find(e=>e.EventID===r.EventID);
      const hasMore = i < checked.length-1;
      return `<div class="tl-item"><div class="tl-left"><div class="tl-dot"><div class="tl-dot-inner"></div></div>${hasMore?'<div class="tl-line"></div>':''}</div><div class="tl-body"><div class="tl-event">${esc(ev?ev.EventName:r.EventID)}</div><div class="tl-date">${esc(ev?ev.Date:'—')}</div><div class="tl-badge-done">✓ 参加済み</div></div></div>`;
    }).join('')+'</div>';
  }catch(err){el.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';}
}

// ── Survey Tab ──
async function loadSurveyTab(){
  const el = document.getElementById('tab-survey');
  el.innerHTML='<div class="spinner"></div>';
  try{
    const mySurveys = await api('getMySurveys',{participantId:currentUser.ParticipantID});
    if(!mySurveys||!mySurveys.length){
      el.innerHTML='<div class="alert alert-info">まだアンケートはありません</div>';
      return;
    }
    const answered = mySurveys.filter(s=>s.Rating&&Number(s.Rating)>0);
    const unanswered = mySurveys.filter(s=>!s.Rating||s.Rating==='');
    let html='';
    // Chart
    if(answered.length>0){
      html+=`<div class="card" style="padding:16px;"><h4 style="font-family:'Noto Serif JP',serif;font-size:.88rem;font-weight:700;color:var(--ink);margin-bottom:4px;">📊 イベント別満足度</h4><div class="chart-wrap"><canvas id="survey-chart"></canvas></div></div>`;
    }
    // Answered
    answered.forEach(s=>{
      html+=`<div class="survey-done"><strong>${esc(s.EventName)}</strong><div class="star-display">${'★'.repeat(Number(s.Rating))}${'☆'.repeat(5-Number(s.Rating))} ${s.Rating}/5</div>${s.Comment?'<div style="font-size:.76rem;margin-top:2px;">'+esc(s.Comment)+'</div>':''}</div>`;
    });
    // Unanswered forms
    unanswered.forEach(s=>{
      const sid='srv_'+s.SurveyID;
      html+=`<div class="survey-form" id="sf-${esc(s.SurveyID)}"><h4>${esc(s.EventName)}　満足度アンケート</h4><div class="star-rating">`;
      for(let i=5;i>=1;i--) html+=`<input type="radio" id="${sid}_${i}" name="${sid}" value="${i}"><label for="${sid}_${i}">★</label>`;
      html+=`</div><textarea id="cmt-${esc(s.SurveyID)}" class="form-control" rows="2" placeholder="一言コメント（任意）" style="margin-bottom:8px;resize:none;"></textarea><button class="btn-primary" style="padding:10px;" onclick="submitSurvey('${esc(s.SurveyID)}','${esc(s.EventID)}','${esc(currentUser.ParticipantID)}')">送信する</button></div>`;
    });
    el.innerHTML=html;
    // Draw chart
    if(answered.length>0){
      const ctx=document.getElementById('survey-chart');
      if(ctx){
        if(chartInstances.survey) chartInstances.survey.destroy();
        chartInstances.survey=new Chart(ctx,{
          type:'bar',
          data:{
            labels:answered.map(s=>s.EventName.length>10?s.EventName.slice(0,10)+'…':s.EventName),
            datasets:[{label:'満足度',data:answered.map(s=>Number(s.Rating)),backgroundColor:['rgba(232,160,184,.7)','rgba(112,96,168,.7)','rgba(200,90,32,.7)','rgba(122,168,204,.7)'],borderRadius:8,borderSkipped:false}]
          },
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:5,ticks:{stepSize:1}}}}
        });
      }
    }
  }catch(err){el.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';}
}

async function submitSurvey(surveyId, eventId, participantId){
  const rEl=document.querySelector('input[name="srv_'+surveyId+'"]:checked');
  if(!rEl){alert('評価を選択してください');return;}
  const rating=rEl.value; const comment=document.getElementById('cmt-'+surveyId).value.trim();
  try{
    await api('submitSurvey',{surveyId,eventId,participantId,rating,comment});
    const f=document.getElementById('sf-'+surveyId);
    if(f) f.outerHTML='<div class="survey-done">回答ありがとうございました！<div class="star-display">'+'★'.repeat(Number(rating))+'☆'.repeat(5-Number(rating))+'</div></div>';
  }catch(err){alert(esc(err.message));}
}

// ── Notifications Tab ──
function loadNotificationsTab(){
  const el = document.getElementById('tab-notifications');
  if(!currentUser){ el.innerHTML=''; return; }
  const items = getNewsItems(currentUser.ParticipantID)
    .filter(n=>n.userId===currentUser.ParticipantID)
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(!items.length){
    el.innerHTML='<div class="alert alert-info" style="margin-top:8px;">個別の通知はありません</div>';
    return;
  }
  el.innerHTML=items.map(n=>{
    const read=isNewsRead(n.id);
    const date=new Date(n.createdAt).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
    return `<div style="padding:14px 0;border-bottom:1px solid var(--bg2);cursor:pointer;" onclick="openNewsDetail('${esc(n.id)}')">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:700;color:var(--ink);">${esc(n.title)}</span>
        <span style="font-size:.68rem;color:var(--ink-soft);">${date}</span>
      </div>
      <div style="font-size:.8rem;color:var(--ink-soft);line-height:1.7;">${esc(n.body.slice(0,80))}${n.body.length>80?'…':''}</div>
      ${!read?'<span class="badge badge-new" style="margin-top:6px;">未読</span>':''}
    </div>`;
  }).join('');
}

// ── Chat Tab ──
function loadChatTab(){
  const el = document.getElementById('tab-chat');
  if(!currentUser){ el.innerHTML=''; return; }
  const msgs = getChatMessages(currentUser.ParticipantID);
  // mark admin messages as read
  const all = lsGet('connecplus_chat')||[];
  let changed=false;
  all.forEach(m=>{if(m.receiverId===currentUser.ParticipantID&&!m.isRead){m.isRead=true;changed=true;}});
  if(changed){lsSet('connecplus_chat',all);updateBadges();}
  el.innerHTML=`
    <div class="chat-area">
      <div class="chat-messages" id="chat-msg-list">${msgs.length?msgs.map(m=>renderBubble(m)).join(''):'<div class="chat-empty"><span>💬</span><p>まだメッセージがありません<br><small>運営へのご質問や<br>ご連絡はこちらから</small></p></div>'}</div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="メッセージを入力..." rows="1" onkeydown="handleChatKey(event)"></textarea>
        <button class="chat-send" onclick="doSendChat()">送信</button>
      </div>
    </div>`;
  // scroll to bottom
  setTimeout(()=>{const cm=document.getElementById('chat-msg-list');if(cm)cm.scrollTop=cm.scrollHeight;},100);
}

function renderBubble(m){
  const isMine = m.senderId === currentUser.ParticipantID;
  const time = new Date(m.createdAt).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const date = new Date(m.createdAt).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
  return `<div class="chat-bubble ${isMine?'mine':'theirs'}">
    ${!isMine?`<div class="bubble-sender">connec+a 運営</div>`:''}
    <div class="bubble-text">${esc(m.text)}</div>
    <div class="bubble-meta">${date} ${time}${isMine&&m.isRead?' ✓✓':''}</div>
  </div>`;
}

function handleChatKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSendChat();}
}

function doSendChat(){
  const input=document.getElementById('chat-input');
  const text=(input.value||'').trim();
  if(!text||!currentUser) return;
  const msg=sendChatMessage(currentUser.ParticipantID, currentUser.Name, text);
  input.value='';
  // append bubble
  const cm=document.getElementById('chat-msg-list');
  const empty=cm.querySelector('.chat-empty');
  if(empty) empty.remove();
  const div=document.createElement('div');
  div.innerHTML=renderBubble(msg);
  cm.appendChild(div.firstElementChild);
  cm.scrollTop=cm.scrollHeight;
}

// ── Profile Edit Tab ──
function renderProfileEdit(){
  if(!currentUser) return;
  const p=currentUser;
  const langOptions=['ja','en','zh','ko','es','fr','pt','id','th','vi','ar','hi','de','it','ru'];
  const langNames={ja:'日本語',en:'English',zh:'中文',ko:'한국어',es:'Español',fr:'Français',pt:'Português',id:'Bahasa Indonesia',th:'ภาษาไทย',vi:'Tiếng Việt',ar:'العربية',hi:'हिन्दी',de:'Deutsch',it:'Italiano',ru:'Русский'};
  document.getElementById('tab-profile-edit').innerHTML=
    '<div id="pe-alert"></div>'+
    '<div class="form-group"><label class="form-label">お名前</label><input id="pe-name" class="form-control" type="text" value="'+esc(p.Name||'')+'"></div>'+
    '<div class="form-group"><label class="form-label">メールアドレス</label><input id="pe-email" class="form-control" type="email" value="'+esc(p.Email||'')+'"><p style="font-size:.7rem;color:var(--ink-soft);margin-top:5px;line-height:1.6;">メールアドレスを変更すると次回ログイン時に新しいアドレスが必要になります</p></div>'+
    '<div class="form-group"><label class="form-label">表示言語</label><select id="pe-lang" class="form-control" onchange="setLang(this.value)">'+
    langOptions.map(l=>'<option value="'+l+'"'+(currentLang===l?' selected':'')+'>'+langNames[l]+'</option>').join('')+
    '</select></div>'+
    '<button class="btn-primary" onclick="saveProfile()">変更を保存</button>';
}

async function saveProfile(){
  const alertEl=document.getElementById('pe-alert'); alertEl.innerHTML='';
  const newName=document.getElementById('pe-name').value.trim();
  const newEmail=document.getElementById('pe-email').value.trim();
  if(!newName){alertEl.innerHTML='<div class="alert alert-err">お名前を入力してください</div>';return;}
  if(!newEmail||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){alertEl.innerHTML='<div class="alert alert-err">有効なメールアドレスを入力してください</div>';return;}
  const btn=document.querySelector('#tab-profile-edit .btn-primary'); btn.disabled=true; btn.textContent='保存中...';
  try{
    const updated=await api('updateParticipantProfile',{participantId:currentUser.ParticipantID,name:newName,email:newEmail});
    currentUser=Object.assign({},currentUser,{Name:updated.Name||newName,Email:updated.Email||newEmail});
    sessionStorage.setItem('auth_user',JSON.stringify(currentUser));
    document.getElementById('avatar-initial').textContent=currentUser.Name.charAt(0).toUpperCase();
    updateHeader(currentUser);
    alertEl.innerHTML='<div class="alert alert-ok">プロフィールを更新しました！</div>';
  }catch(err){alertEl.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';}
  btn.disabled=false; btn.textContent='変更を保存';
}

// PHOTOS PAGE
// ════════════════════════════════════════════════
async function showPhotoPage(){
  if(!currentUser){showPage('page-login');return;}
  showPage('page-photos');
  await loadPhotoPage();
}

async function loadPhotoPage(){
  const chipsEl = document.getElementById('photo-event-chips');
  const contentEl = document.getElementById('photo-content');
  chipsEl.innerHTML='<div class="spinner" style="margin:0;width:20px;height:20px;border-width:2px;"></div>';
  contentEl.innerHTML='';
  try{
    const allRegs = await api('getAllRegistrations',{});
    const myRegs = allRegs.filter(r=>r.ParticipantID===currentUser.ParticipantID);
    const stats = await api('getStats');
    const events = (stats.eventStats||[]).filter(ev=>myRegs.some(r=>r.EventID===ev.EventID));
    if(!events.length){
      chipsEl.innerHTML='';
      contentEl.innerHTML='<div class="photo-locked"><div class="photo-locked-icon">🔒</div><div class="photo-locked-text">参加済みのイベントがないため<br>フォトページを閲覧できません。<br>イベントに参加するとフォトが解放されます。</div></div>';
      return;
    }
    // chips
    chipsEl.innerHTML=events.map((ev,i)=>`<button class="event-chip${i===0?' active':''}" onclick="selectPhotoEvent('${esc(ev.EventID)}',this)">${esc(ev.EventName)}</button>`).join('');
    activePhotoEventId = events[0].EventID;
    renderPhotoGrid(events[0].EventID, events[0].EventName);
  }catch(err){
    contentEl.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';
    chipsEl.innerHTML='';
  }
}

function selectPhotoEvent(eventId, btn){
  document.querySelectorAll('.event-chip').forEach(c=>c.classList.remove('active'));
  if(btn) btn.classList.add('active');
  activePhotoEventId = eventId;
  const name = btn ? btn.textContent : eventId;
  renderPhotoGrid(eventId, name);
}

function renderPhotoGrid(eventId, eventName){
  const el = document.getElementById('photo-content');
  const photos = getPhotos(eventId);
  let html=`
    <div class="upload-zone" onclick="document.getElementById('photo-file-input').click()">
      <div class="upload-icon">📷</div>
      <div class="upload-text">クリックして写真をアップロード<br><strong>JPG / PNG / WebP</strong>（最大10MB）</div>
    </div>
    <input type="file" id="photo-file-input" accept="image/*" multiple style="display:none;" onchange="handlePhotoUpload(this,'${esc(eventId)}')">
  `;
  if(photos.length){
    html+=`<div style="margin-bottom:8px;font-size:.78rem;color:var(--ink-soft);">${photos.length}枚の写真</div>`;
    html+=`<div class="photo-grid">${photos.map(p=>`
      <div class="photo-item" onclick="openPhotoViewer('${p.url.replace(/'/g,"\\'")}')">
        <img src="${p.url}" alt="${esc(p.name)}" loading="lazy">
        <div class="photo-overlay"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg></div>
      </div>`).join('')}</div>`;
  } else {
    html+=`<div style="text-align:center;padding:40px 20px;color:var(--ink-soft);font-size:.85rem;">まだ写真はありません。<br>最初の1枚をアップロードしてみましょう！</div>`;
  }
  el.innerHTML=html;
}

function handlePhotoUpload(input, eventId){
  const files = Array.from(input.files||[]);
  if(!files.length) return;
  const MAX=10*1024*1024;
  let count=0;
  files.forEach(file=>{
    if(file.size>MAX){alert(file.name+' は10MBを超えています');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      addPhoto(eventId, file.name, e.target.result);
      count++;
      if(count===files.length) renderPhotoGrid(eventId, '');
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function openPhotoViewer(url){
  document.getElementById('photo-viewer-img').src=url;
  document.getElementById('photo-viewer').style.display='flex';
}
