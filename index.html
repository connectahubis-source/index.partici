<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>connec+a</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700;900&family=Zen+Old+Mincho:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ai:#1a2744;--ai-mid:#2a4a7f;--ai-soft:#4a6fa5;--ai-pale:#d4e4f7;
      --shiro:#f8f9fc;--shiro-warm:#fdfaf5;--shiro-2:#eef2f8;--border:rgba(42,74,127,.15);
      --haru:#f4b8cb;--natsu:#7b5ea7;--aki:#d4511a;--fuyu:#b8d4f0;--matcha:#4e7252;
      --shadow:0 2px 16px rgba(26,39,68,.08);--shadow-md:0 8px 32px rgba(26,39,68,.14);--shadow-lg:0 16px 48px rgba(26,39,68,.2);
      --r:16px;--rs:10px;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--shiro);color:var(--ai);min-height:100vh;overflow-x:hidden;}
    .indigo-pattern{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 8 L72 40 L40 72 L8 40 Z' fill='none' stroke='%231a2744' stroke-width='1.5'/%3E%3Ccircle cx='40' cy='40' r='3' fill='%231a2744'/%3E%3C/svg%3E");}
    .seasons-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .petal{position:absolute;font-size:.9rem;animation:petalFall linear infinite;opacity:0;}
    @keyframes petalFall{0%{transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0;}5%{opacity:.5;}95%{opacity:.3;}100%{transform:translateY(105vh) rotate(720deg) translateX(60px);opacity:0;}}
    .hotaru{position:absolute;width:3px;height:3px;border-radius:50%;background:#c8e832;box-shadow:0 0 6px #c8e832;animation:hotaruFloat ease-in-out infinite;opacity:0;}
    @keyframes hotaruFloat{0%,100%{opacity:0;transform:translate(0,0);}20%{opacity:.8;}50%{transform:translate(25px,-18px);}80%{opacity:.5;}}
    .momiji{position:absolute;font-size:.85rem;animation:momijiDrift linear infinite;opacity:0;}
    @keyframes momijiDrift{0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0;}8%{opacity:.5;}92%{opacity:.25;}100%{transform:translateY(105vh) rotate(-540deg) translateX(-80px);opacity:0;}}
    .yuki{position:absolute;border-radius:50%;background:rgba(184,212,240,.7);animation:yukiFall linear infinite;opacity:0;}
    @keyframes yukiFall{0%{opacity:0;}10%{opacity:.7;}90%{opacity:.3;}100%{transform:translateY(105vh);opacity:0;}}
    .season-bar{height:2px;background:linear-gradient(90deg,var(--haru),var(--natsu),var(--aki),var(--fuyu));}
    .header{position:sticky;top:0;z-index:100;background:rgba(248,249,252,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
    .header__logo{display:flex;align-items:center;gap:10px;}
    .header__logo-mark{width:34px;height:34px;background:var(--ai);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:.65rem;color:#fff;font-weight:900;}
    .header__logo-text{font-family:'Zen Old Mincho',serif;font-size:1.05rem;color:var(--ai);font-weight:700;letter-spacing:.08em;}
    .header__logo-text span{color:var(--ai-soft);}
    .header__right{display:flex;align-items:center;gap:8px;}
    .lang-sel{padding:5px 10px;border-radius:99px;font-size:.72rem;border:1.5px solid var(--border);background:transparent;color:var(--ai-mid);cursor:pointer;outline:none;font-family:'Noto Sans JP',sans-serif;}
    .header__btn{padding:7px 14px;border-radius:99px;font-size:.78rem;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--ai-mid);cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .header__btn:hover{background:var(--ai);color:#fff;border-color:var(--ai);}
    .header__user{font-size:.8rem;color:var(--ai-soft);display:flex;align-items:center;gap:6px;}
    .header__user strong{color:var(--ai);}
    main{position:relative;z-index:2;padding:36px 20px;}
    .container{max-width:880px;margin:0 auto;}
    .container-sm{max-width:520px;margin:0 auto;}
    .auth-wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:2;}
    .auth-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-md);padding:40px 36px;width:100%;max-width:420px;border:1px solid var(--border);position:relative;overflow:hidden;}
    .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--haru),var(--natsu),var(--aki),var(--fuyu));}
    .auth-logo{text-align:center;margin-bottom:24px;}
    .auth-logo-mark{width:52px;height:52px;background:var(--ai);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:.75rem;color:#fff;font-weight:900;margin:0 auto 10px;}
    .auth-logo-name{font-family:'Zen Old Mincho',serif;font-size:1.4rem;font-weight:900;color:var(--ai);letter-spacing:.08em;}
    .auth-logo-sub{font-size:.7rem;color:var(--ai-soft);letter-spacing:.2em;margin-top:2px;}
    .auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--shiro-2);border-radius:var(--rs);padding:3px;}
    .auth-tab{flex:1;padding:9px;border:none;background:none;font-size:.85rem;font-weight:600;color:var(--ai-soft);cursor:pointer;border-radius:8px;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .auth-tab.active{background:#fff;color:var(--ai);box-shadow:var(--shadow);}
    .auth-panel{display:none;}
    .auth-panel.active{display:block;}
    .sent-box{text-align:center;padding:20px 0;}
    .sent-box .icon{font-size:3.5rem;margin-bottom:16px;}
    .sent-box h3{font-family:'Zen Old Mincho',serif;font-size:1.1rem;color:var(--ai);margin-bottom:8px;}
    .sent-box p{font-size:.875rem;color:var(--ai-soft);line-height:1.8;}
    .sent-email{display:inline-block;background:var(--ai-pale);border-radius:6px;padding:4px 12px;font-weight:700;color:var(--ai-mid);margin:8px 0;font-size:.9rem;}
    .hero{text-align:center;margin-bottom:44px;animation:heroIn .8s cubic-bezier(.16,1,.3,1) both;}
    @keyframes heroIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .hero__eyebrow{font-size:.7rem;letter-spacing:.3em;color:var(--ai-soft);margin-bottom:14px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;}
    .hero__eyebrow::before,.hero__eyebrow::after{content:'';width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--ai-pale));}
    .hero__eyebrow::after{background:linear-gradient(90deg,var(--ai-pale),transparent);}
    .hero__title{font-family:'Zen Old Mincho',serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:900;color:var(--ai);line-height:1.15;margin-bottom:14px;letter-spacing:.03em;}
    .hero__title em{font-style:normal;background:linear-gradient(135deg,var(--ai-mid),var(--natsu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero__desc{font-size:.875rem;color:var(--ai-soft);line-height:1.9;max-width:400px;margin:0 auto 24px;}
    .seasons-banner{display:flex;height:4px;border-radius:99px;overflow:hidden;max-width:260px;margin:0 auto;gap:2px;}
    .sb{flex:1;border-radius:99px;}
    .event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;}
    .event-card{background:var(--shiro-warm);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s;animation:cardIn .5s ease both;position:relative;}
    .event-card:hover{transform:translateY(-7px);box-shadow:var(--shadow-lg);}
    .event-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .event-card:nth-child(4n+1)::before{background:linear-gradient(90deg,var(--haru),#d080a0);}
    .event-card:nth-child(4n+2)::before{background:linear-gradient(90deg,var(--natsu),#5a3a8a);}
    .event-card:nth-child(4n+3)::before{background:linear-gradient(90deg,var(--aki),#a03010);}
    .event-card:nth-child(4n)::before{background:linear-gradient(90deg,#4a6fa5,var(--fuyu));}
    @keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .event-card:nth-child(1){animation-delay:.04s;}.event-card:nth-child(2){animation-delay:.08s;}.event-card:nth-child(3){animation-delay:.12s;}.event-card:nth-child(4){animation-delay:.16s;}
    .event-card__visual{height:96px;display:flex;align-items:center;justify-content:center;}
    .event-card:nth-child(4n+1) .event-card__visual{background:linear-gradient(135deg,rgba(244,184,203,.25),rgba(137,201,122,.15));}
    .event-card:nth-child(4n+2) .event-card__visual{background:linear-gradient(135deg,rgba(123,94,167,.18),rgba(91,163,232,.15));}
    .event-card:nth-child(4n+3) .event-card__visual{background:linear-gradient(135deg,rgba(212,81,26,.15),rgba(232,200,74,.18));}
    .event-card:nth-child(4n) .event-card__visual{background:linear-gradient(135deg,rgba(184,212,240,.25),rgba(176,40,60,.1));}
    .event-card__visual-label{font-family:'Zen Old Mincho',serif;font-size:.65rem;letter-spacing:.2em;color:rgba(26,39,68,.3);font-weight:700;text-transform:uppercase;}
    .event-card__body{padding:16px 18px 18px;}
    .event-card__tag{font-size:.65rem;letter-spacing:.2em;color:var(--ai-soft);margin-bottom:4px;font-weight:600;text-transform:uppercase;}
    .event-card__name{font-family:'Zen Old Mincho',serif;font-size:1rem;font-weight:700;color:var(--ai);margin-bottom:4px;line-height:1.4;}
    .event-card__date{font-size:.75rem;color:var(--ai-soft);margin-bottom:12px;}
    .event-card__meta{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
    .event-card__row{display:flex;justify-content:space-between;font-size:.8rem;}
    .event-card__label{color:var(--ai-soft);}
    .event-card__value{font-weight:600;color:var(--ai-mid);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 20px;border-radius:99px;font-size:.875rem;font-weight:700;cursor:pointer;border:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);font-family:'Noto Sans JP',sans-serif;}
    .btn:active{transform:scale(.97)!important;}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
    .btn-ai{background:var(--ai);color:#fff;box-shadow:0 4px 14px rgba(26,39,68,.2);}
    .btn-ai:hover{background:var(--ai-mid);transform:translateY(-1px);}
    .btn-h{background:linear-gradient(135deg,var(--haru),#c97090);color:#fff;}
    .btn-n{background:linear-gradient(135deg,var(--natsu),#5a3a8a);color:#fff;}
    .btn-a{background:linear-gradient(135deg,var(--aki),#a03010);color:#fff;}
    .btn-f{background:linear-gradient(135deg,#4a6fa5,var(--fuyu));color:#fff;}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ai-mid);}
    .btn-outline:hover{border-color:var(--ai-mid);}
    .btn-full{width:100%;}
    .btn-lg{padding:13px 26px;font-size:.95rem;}
    .badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.7rem;font-weight:700;}
    .badge-free{background:rgba(78,114,82,.1);color:#2d7a20;}
    .badge-paid{background:rgba(42,74,127,.08);color:var(--ai-mid);}
    .badge-full{background:rgba(212,81,26,.1);color:var(--aki);}
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:.8rem;font-weight:700;color:var(--ai-mid);margin-bottom:7px;letter-spacing:.04em;}
    .form-control{width:100%;padding:11px 15px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.9rem;color:var(--ai);background:#fff;outline:none;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .form-control:focus{border-color:var(--ai-mid);box-shadow:0 0 0 3px rgba(42,74,127,.1);}
    .form-control::placeholder{color:rgba(74,111,165,.4);}
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:26px;margin-bottom:18px;border:1px solid var(--border);}
    .card-title{font-family:'Zen Old Mincho',serif;font-size:1.05rem;font-weight:700;color:var(--ai);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
    .alert{padding:13px 16px;border-radius:var(--rs);font-size:.875rem;margin-bottom:14px;line-height:1.7;}
    .alert-success{background:#f0fdf4;border-left:3px solid #22c55e;color:#15803d;}
    .alert-danger{background:rgba(212,81,26,.06);border-left:3px solid var(--aki);color:#8a2010;}
    .alert-info{background:rgba(42,74,127,.06);border-left:3px solid var(--ai-soft);color:var(--ai-mid);}
    .alert-warning{background:rgba(184,212,240,.2);border-left:3px solid var(--fuyu);color:#3a5a7a;}
    .spinner{width:36px;height:36px;border:3px solid var(--shiro-2);border-top-color:var(--ai-mid);border-radius:50%;animation:spin .8s linear infinite;margin:28px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{text-align:center;color:var(--ai-soft);font-size:.875rem;}
    .event-hero{border-radius:var(--r);padding:20px 22px;margin-bottom:18px;}
    .eh-h{background:linear-gradient(135deg,rgba(244,184,203,.2),rgba(137,201,122,.12));border:1px solid rgba(244,184,203,.35);}
    .eh-n{background:linear-gradient(135deg,rgba(123,94,167,.15),rgba(91,163,232,.12));border:1px solid rgba(123,94,167,.25);}
    .eh-a{background:linear-gradient(135deg,rgba(212,81,26,.12),rgba(232,200,74,.14));border:1px solid rgba(212,81,26,.2);}
    .eh-f{background:linear-gradient(135deg,rgba(184,212,240,.22),rgba(176,40,60,.08));border:1px solid rgba(184,212,240,.35);}
    .event-hero__name{font-family:'Zen Old Mincho',serif;font-size:1.15rem;font-weight:700;color:var(--ai);margin-bottom:8px;}
    .event-hero__meta{font-size:.85rem;color:var(--ai-mid);line-height:2;}
    .ticket{background:linear-gradient(135deg,#fff,var(--shiro));border:1.5px dashed rgba(42,74,127,.2);border-radius:var(--r);padding:26px;text-align:center;margin:18px 0;position:relative;}
    .ticket::before,.ticket::after{content:'';position:absolute;width:20px;height:20px;background:var(--shiro);border-radius:50%;top:50%;transform:translateY(-50%);}
    .ticket::before{left:-11px;border:1.5px dashed rgba(42,74,127,.2);}
    .ticket::after{right:-11px;border:1.5px dashed rgba(42,74,127,.2);}
    .ticket__title{font-family:'Zen Old Mincho',serif;font-size:.78rem;font-weight:700;color:var(--ai-mid);margin-bottom:14px;letter-spacing:.18em;}
    #qr-canvas{display:flex;justify-content:center;margin:0 auto 10px;}
    .ticket__id{font-size:.66rem;color:var(--ai-soft);font-family:monospace;word-break:break-all;background:var(--shiro-2);padding:5px 9px;border-radius:5px;display:inline-block;}
    .profile-card{border-radius:var(--r);padding:24px;margin-bottom:18px;background:var(--ai);color:#fff;position:relative;overflow:hidden;}
    .profile-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 10% 20%,rgba(244,184,203,.15) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 80%,rgba(123,94,167,.15) 0%,transparent 60%);}
    .profile-name{font-family:'Zen Old Mincho',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px;position:relative;z-index:1;}
    .profile-email{font-size:.8rem;opacity:.55;margin-bottom:16px;position:relative;z-index:1;}
    .profile-stats{display:flex;gap:20px;position:relative;z-index:1;}
    .profile-stat__num{font-size:1.7rem;font-weight:800;line-height:1;}
    .profile-stat__label{font-size:.68rem;opacity:.55;margin-top:2px;}
    .tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--shiro-2);padding:3px;border-radius:var(--rs);}
    .tab-btn{flex:1;padding:8px 12px;border:none;background:none;font-size:.8rem;font-weight:600;color:var(--ai-soft);cursor:pointer;border-radius:7px;transition:all .2s;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
    .tab-btn.active{background:#fff;color:var(--ai);box-shadow:var(--shadow);}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:.82rem;}
    th{padding:9px 12px;text-align:left;color:var(--ai-soft);font-weight:600;border-bottom:2px solid var(--shiro-2);white-space:nowrap;}
    td{padding:10px 12px;border-bottom:1px solid var(--shiro-2);}
    tr:hover>td{background:rgba(42,74,127,.02);}
    .payment-box{background:rgba(42,74,127,.05);border:1px solid rgba(42,74,127,.12);border-radius:var(--rs);padding:14px;margin-bottom:14px;font-size:.85rem;}
    .payment-box h4{color:var(--ai-mid);margin-bottom:5px;font-weight:700;}
    .payment-box p{color:var(--ai-mid);line-height:1.8;opacity:.85;}
    .survey-form{background:linear-gradient(135deg,rgba(244,184,203,.12),rgba(42,74,127,.06));border:1px solid rgba(244,184,203,.3);border-radius:var(--rs);padding:14px;margin-bottom:12px;}
    .survey-form h4{font-family:'Zen Old Mincho',serif;font-size:.88rem;font-weight:700;color:var(--ai);margin-bottom:8px;}
    .star-rating{display:flex;gap:4px;margin-bottom:8px;flex-direction:row-reverse;justify-content:flex-end;}
    .star-rating input{display:none;}
    .star-rating label{font-size:1.7rem;cursor:pointer;color:#e5e7eb;transition:color .15s;}
    .star-rating input:checked ~ label,.star-rating label:hover,.star-rating label:hover ~ label{color:#f59e0b;}
    .survey-done{background:rgba(78,114,82,.08);border:1px solid rgba(78,114,82,.2);border-radius:var(--rs);padding:11px 14px;font-size:.8rem;color:var(--matcha);margin-bottom:10px;}
    .star-display{color:#f59e0b;font-size:.95rem;}
    .page{display:none;}
    .page.active{display:block;animation:pageIn .4s ease both;}
    @keyframes pageIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .success-anim{text-align:center;padding:18px 0 6px;animation:burstIn .7s cubic-bezier(.34,1.56,.64,1) both;}
    @keyframes burstIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
    @media(max-width:600px){.event-grid{grid-template-columns:1fr;}main{padding:20px 12px;}.card{padding:18px;}.auth-card{padding:28px 20px;}.tabs{overflow-x:auto;}}
  </style>
</head>
<body>
<div class="indigo-pattern"></div>
<div class="seasons-bg" id="seasons-bg"></div>
<div class="season-bar"></div>
<header class="header">
  <div class="header__logo">
    <div class="header__logo-mark">c+a</div>
    <span class="header__logo-text">connec<span>+</span>a</span>
  </div>
  <div class="header__right">
    <select class="lang-sel" id="lang-sel" onchange="setLang(this.value)">
      <option value="ja">日本語</option><option value="en">English</option><option value="zh">中文</option>
      <option value="ko">한국어</option><option value="es">Español</option><option value="fr">Français</option>
      <option value="pt">Português</option><option value="id">Indonesia</option><option value="th">ภาษาไทย</option>
      <option value="vi">Tiếng Việt</option><option value="ar">العربية</option><option value="hi">हिन्दी</option>
      <option value="de">Deutsch</option><option value="it">Italiano</option><option value="ru">Русский</option>
    </select>
    <div class="header__user" id="header-user" style="display:none;">
      <strong id="header-username"></strong>
      <button class="header__btn" onclick="logout()" data-i18n="logout">ログアウト</button>
    </div>
    <button class="header__btn" id="btn-mypage" onclick="showMyPage()" style="display:none;" data-i18n="mypage">マイページ</button>
    <button class="header__btn" id="btn-back" onclick="showEventList()" style="display:none;" data-i18n="back">一覧へ</button>
  </div>
</header>

<div id="page-auth" class="page active">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-mark">c+a</div>
        <div class="auth-logo-name">connec+a</div>
        <div class="auth-logo-sub">Event Platform</div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')" data-i18n="login">ログイン</button>
        <button class="auth-tab" onclick="switchAuthTab('register')" data-i18n="newRegister">新規登録</button>
      </div>
      <div id="auth-login" class="auth-panel active">
        <div id="login-alert"></div>
        <div class="form-group">
          <label class="form-label" data-i18n="emailLabel">メールアドレス</label>

let currentLang=localStorage.getItem('lang')||'ja';
function t(k){return(I18N[currentLang]||I18N.ja)[k]||I18N.ja[k]||k;}
function setLang(l){currentLang=l;localStorage.setItem('lang',l);document.getElementById('lang-sel').value=l;applyI18n();}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.dataset.i18nPh);});}
document.getElementById('lang-sel').value=currentLang;

async function api(action,params){params=params||{};const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(Object.assign({action},params))});const json=await res.json();if(!json.success)throw new Error(json.error||'Error');return json.data;}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function initSeasons(){const bg=document.getElementById('seasons-bg');const items=[...Array.from({length:6},(_,i)=>({t:'petal',sym:'🌸',l:(i*16+4)+'%',d:(8+i*1.2)+'s',dl:(i*1.8)+'s'})),...Array.from({length:5},(_,i)=>({t:'hotaru',l:(i*18+3)+'%',tp:(i*12+25)+'%',d:(4+i)+'s',dl:(i*2)+'s'})),...Array.from({length:5},(_,i)=>({t:'momiji',sym:['🍁','🍂'][i%2],l:(i*18+5)+'%',d:(7+i*1.1)+'s',dl:(i*2+1)+'s'})),...Array.from({length:8},(_,i)=>({t:'yuki',l:(i*11+1)+'%',sz:(3+i%3)+'px',d:(5+i*0.7)+'s',dl:(i*0.8)+'s'}))];items.forEach(item=>{const el=document.createElement('div');if(item.t==='petal'||item.t==='momiji'){el.className=item.t;el.textContent=item.sym;el.style.cssText=`left:${item.l};animation-duration:${item.d};animation-delay:${item.dl};`;}else if(item.t==='hotaru'){el.className='hotaru';el.style.cssText=`left:${item.l};top:${item.tp};animation-duration:${item.d};animation-delay:${item.dl};`;}else{el.className='yuki';el.style.cssText=`left:${item.l};width:${item.sz};height:${item.sz};animation-duration:${item.d};animation-delay:${item.dl};`;}bg.appendChild(el);});}
initSeasons();

let currentUser=null,currentEvent=null,currentEventIdx=0;
const SEASON_BTNS=['btn-h','btn-n','btn-a','btn-f'],EH_CLASS=['eh-h','eh-n','eh-a','eh-f'],SEASON_LABELS=['Spring','Summer','Autumn','Winter'];
function formatPrice(p,tp){if(tp==='FREE'||Number(p)===0)return '<span class="badge badge-free">'+t('free')+'</span>';return '<span class="badge badge-paid">¥'+Number(p).toLocaleString()+'</span>';}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function updateHeader(user){if(user){document.getElementById('header-user').style.display='flex';document.getElementById('header-username').textContent=user.Name;document.getElementById('btn-mypage').style.display='inline-flex';}else{document.getElementById('header-user').style.display='none';document.getElementById('btn-mypage').style.display='none';}document.getElementById('btn-back').style.display='none';}
function showEventList(){showPage('page-events');document.getElementById('btn-back').style.display='none';loadEvents();}
function showRegisterPage(ev,idx){if(!currentUser){showPage('page-auth');return;}currentEvent=ev;currentEventIdx=idx;showPage('page-register');document.getElementById('btn-back').style.display='inline-flex';renderRegisterPage(ev,idx);}
function showMyPage(){if(!currentUser){showPage('page-auth');return;}showPage('page-mypage');document.getElementById('btn-back').style.display='inline-flex';loadMyPageData();}

function switchAuthTab(tab){document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.auth-panel').forEach(p=>p.classList.remove('active'));document.getElementById('auth-'+tab).classList.add('active');document.querySelectorAll('.auth-tab').forEach(b=>{if(b.getAttribute('onclick')==="switchAuthTab('"+tab+"')")b.classList.add('active');});}
async function requestLink(mode){const alertEl=document.getElementById(mode+'-alert');alertEl.innerHTML='';const email=document.getElementById(mode+'-email').value.trim();if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alertEl.innerHTML='<div class="alert alert-danger">'+t('invalidEmail')+'</div>';return;}let name='';if(mode==='register'){name=document.getElementById('register-name').value.trim();if(!name){alertEl.innerHTML='<div class="alert alert-danger">'+t('nameRequired')+'</div>';return;}}const btn=document.querySelector('#auth-'+mode+' .btn-ai');btn.disabled=true;btn.textContent=t('sending');try{await api('requestMagicLink',{email,name,siteUrl:SITE_URL});document.getElementById('sent-email-display').textContent=email;switchAuthTab('sent');}catch(err){if(err.message==='NAME_REQUIRED')alertEl.innerHTML='<div class="alert alert-warning">'+t('emailNotFound')+'</div>';else alertEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';}btn.disabled=false;btn.textContent=mode==='login'?t('sendLoginLink'):t('sendRegisterLink');}
['login-email','register-email','register-name'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter'){const m=id.startsWith('login')?'login':'register';requestLink(m);}});});

async function verifyTokenAndLogin(token,pendingSurveyId){showPage('page-auth');const sentPanel=document.getElementById('auth-sent');sentPanel.innerHTML='<div class="sent-box"><div class="spinner" style="margin:20px auto;"></div><p>'+t('verifyingToken')+'</p></div>';switchAuthTab('sent');try{const participant=await api('verifyToken',{token});currentUser=participant;sessionStorage.setItem('auth_user',JSON.stringify(participant));updateHeader(participant);const surveyTarget=pendingSurveyId||sessionStorage.getItem('pending_survey');sessionStorage.removeItem('pending_survey');showPage('page-mypage');document.getElementById('btn-back').style.display='inline-flex';await loadMyPageData();if(surveyTarget){const btn=document.getElementById('survey-tab-btn');if(btn){switchMyTab('survey',btn);setTimeout(()=>{const f=document.getElementById('sf-'+surveyTarget);if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},600);}}}catch(err){const isExpired=err.message==='TOKEN_EXPIRED';sentPanel.innerHTML='<div class="sent-box"><div style="font-size:2.5rem;margin-bottom:14px;">⚠️</div><h3>'+(isExpired?t('tokenExpired'):t('authError'))+'</h3><p>'+(isExpired?t('tokenExpiredDesc'):t('authErrorDesc'))+'</p></div><button class="btn btn-outline btn-full" onclick="switchAuthTab(\'login\')" style="margin-top:16px;">'+t('backToLogin')+'</button>';}}
function logout(){currentUser=null;sessionStorage.removeItem('auth_user');updateHeader(null);showPage('page-auth');}

(async function init(){applyI18n();const params=new URLSearchParams(location.search);const token=params.get('token');const surveyId=params.get('survey');if(token){history.replaceState(null,'',location.pathname);await verifyTokenAndLogin(token,surveyId);return;}if(surveyId){history.replaceState(null,'',location.pathname);const savedUser=sessionStorage.getItem('auth_user');if(savedUser){try{currentUser=JSON.parse(savedUser);updateHeader(currentUser);showPage('page-mypage');document.getElementById('btn-back').style.display='inline-flex';await loadMyPageData();const btn=document.getElementById('survey-tab-btn');if(btn){switchMyTab('survey',btn);setTimeout(()=>{const f=document.getElementById('sf-'+surveyId);if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},500);}return;}catch(e){sessionStorage.clear();}}sessionStorage.setItem('pending_survey',surveyId);showPage('page-auth');return;}const savedUser=sessionStorage.getItem('auth_user');if(savedUser){try{currentUser=JSON.parse(savedUser);updateHeader(currentUser);showPage('page-mypage');document.getElementById('btn-back').style.display='inline-flex';await loadMyPageData();const ps=sessionStorage.getItem('pending_survey');if(ps){sessionStorage.removeItem('pending_survey');const btn=document.getElementById('survey-tab-btn');if(btn){switchMyTab('survey',btn);setTimeout(()=>{const f=document.getElementById('sf-'+ps);if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},600);}}return;}catch(e){sessionStorage.clear();}}showPage('page-auth');})();

async function loadEvents(){const listEl=document.getElementById('event-list');listEl.innerHTML='<div class="spinner"></div><p class="loading-text">'+t('loading')+'</p>';try{const events=await api('getEvents');if(!events||!events.length){listEl.innerHTML='<div class="alert alert-info">'+t('noRegistrations')+'</div>';return;}const grid=document.createElement('div');grid.className='event-grid';events.forEach((ev,i)=>{const isFull=Number(ev.registrationCount||0)>=Number(ev.Capacity);const si=i%4;const card=document.createElement('div');card.className='event-card';card.innerHTML='<div class="event-card__visual"><span class="event-card__visual-label">'+SEASON_LABELS[si]+'</span></div><div class="event-card__body"><div class="event-card__tag">connec+a event</div><div class="event-card__name">'+esc(ev.EventName)+'</div><div class="event-card__date">'+esc(ev.Date)+'</div><div class="event-card__meta"><div class="event-card__row"><span class="event-card__label">'+t('venue')+'</span><span class="event-card__value">'+esc(ev.Location)+'</span></div><div class="event-card__row"><span class="event-card__label">'+t('price')+'</span><span class="event-card__value">'+formatPrice(ev.Price,ev.PaymentType)+'</span></div><div class="event-card__row"><span class="event-card__label">'+t('seats')+'</span><span class="event-card__value">'+(isFull?'<span class="badge badge-full">'+t('full')+'</span>':(Number(ev.Capacity)-Number(ev.registrationCount||0))+' seats')+'</span></div></div>'+(isFull?'<div class="btn btn-outline btn-full" style="cursor:default;opacity:.45;">'+t('full')+'</div>':'<button class="btn '+SEASON_BTNS[si]+' btn-full reg-btn">'+t('registerBtn')+' &rarr;</button>')+'</div>';if(!isFull)card.querySelector('.reg-btn').addEventListener('click',()=>showRegisterPage(ev,i));grid.appendChild(card);});listEl.innerHTML='';listEl.appendChild(grid);}catch(err){listEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';}}

function renderRegisterPage(ev,idx){const si=idx%4;document.getElementById('reg-event-info').innerHTML='<div class="event-hero '+EH_CLASS[si]+'"><div class="event-hero__name">'+esc(ev.EventName)+'</div><div class="event-hero__meta">'+esc(ev.Date)+'&emsp;'+esc(ev.Location)+'&emsp;'+(Number(ev.Price)===0?t('free'):'¥'+Number(ev.Price).toLocaleString())+'</div></div>';document.getElementById('inp-name').value=currentUser?currentUser.Name:'';document.getElementById('inp-email').value=currentUser?currentUser.Email:'';const payInfoEl=document.getElementById('payment-info');payInfoEl.innerHTML='';if(ev.PaymentType!=='FREE'){let h='<div class="payment-box">';if(ev.PaymentType==='PAYPAY'||ev.PaymentType==='PAYPAY_OR_CASH')h+='<h4>PayPay</h4><p>'+t('payPayPending')+'</p>';if(ev.PaymentType==='CASH')h+='<h4>Cash</h4><p>'+t('cashNotice')+'</p>';if(ev.PaymentType==='PAYPAY_OR_CASH')h+='<p style="margin-top:6px;opacity:.7;">当日現金払いも可能です。</p>';h+='</div>';payInfoEl.innerHTML=h;}document.getElementById('reg-alert').innerHTML='';document.getElementById('reg-form').style.display='block';document.getElementById('reg-result').style.display='none';const btn=document.getElementById('btn-submit');btn.className='btn '+SEASON_BTNS[si]+' btn-full btn-lg';btn.textContent=t('registerBtn');btn.disabled=false;}
document.getElementById('btn-submit').addEventListener('click',async()=>{if(!currentUser){showPage('page-auth');return;}const alertEl=document.getElementById('reg-alert');alertEl.innerHTML='';const btn=document.getElementById('btn-submit');btn.disabled=true;btn.textContent=t('registering');try{const result=await api('registerParticipant',{name:currentUser.Name,email:currentUser.Email,phone:'',eventId:currentEvent.EventID});document.getElementById('reg-form').style.display='none';document.getElementById('reg-result').style.display='block';let payHtml='';if(result.paymentStatus==='PAYPAY_PENDING')payHtml='<div class="payment-box"><h4>PayPay</h4><p>'+t('payPayPending')+'</p></div>';else if(result.paymentStatus==='CASH')payHtml='<div class="alert alert-info">'+t('cashNotice')+'</div>';document.getElementById('reg-result').innerHTML='<div class="success-anim" style="font-size:2.5rem;">'+['🌸','🌊','🍁','❄️'][currentEventIdx%4]+'</div><div class="alert alert-success">'+t('regSuccess')+'</div><div class="ticket"><div class="ticket__title">— '+t('ticketTitle')+' —</div><div id="qr-canvas"></div><div class="ticket__id">'+esc(result.qrData)+'</div></div>'+payHtml+'<button class="btn btn-outline btn-full" onclick="showEventList()">'+t('backToList')+'</button>';new QRCode(document.getElementById('qr-canvas'),{text:result.qrData,width:200,height:200,colorDark:'#1a2744',colorLight:'#f8f9fc'});}catch(err){btn.disabled=false;btn.textContent=t('registerBtn');if(err.message==='FULL')alertEl.innerHTML='<div class="alert alert-warning">'+t('regFull')+'</div>';else if(err.message==='ALREADY_REGISTERED')alertEl.innerHTML='<div class="alert alert-info">'+t('regDuplicate')+'</div>';else alertEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';}});

// ★ 参加回数修正済みマイページ
async function loadMyPageData(){
  if(!currentUser)return;
  try{const participants=await api('getParticipants',{query:currentUser.Email});if(participants&&participants.length){const fresh=participants.find(p=>p.Email===currentUser.Email)||participants[0];currentUser=Object.assign({},currentUser,{TotalEvents:fresh.TotalEvents,Rank:fresh.Rank,Name:fresh.Name});sessionStorage.setItem('auth_user',JSON.stringify(currentUser));}}catch(e){console.warn('参加者情報更新失敗',e);}
  const p=currentUser;
  document.getElementById('profile-card').innerHTML='<div class="profile-name">'+esc(p.Name)+'</div><div class="profile-email">'+esc(p.Email)+'</div><div class="profile-stats"><div class="profile-stat"><div class="profile-stat__num">'+esc(p.TotalEvents||0)+'</div><div class="profile-stat__label">'+t('participations')+'</div></div><div class="profile-stat"><div class="profile-stat__num">'+esc(p.Rank||'New')+'</div><div class="profile-stat__label">'+t('rank')+'</div></div></div>';
  try{const [allRegs,stats,mySurveys]=await Promise.all([api('getAllRegistrations',{}),api('getStats'),api('getMySurveys',{participantId:p.ParticipantID})]);const myRegs=allRegs.filter(r=>r.ParticipantID===p.ParticipantID);const events=stats.eventStats||[];
  const checked=myRegs.filter(r=>r.CheckinStatus===true||r.CheckinStatus==='TRUE'||r.CheckinStatus==='true');
  const histEl=document.getElementById('my-history');
  if(!checked.length){histEl.innerHTML='<div class="alert alert-info">'+t('noHistory')+'</div>';}else{let h='<div class="table-wrap"><table><thead><tr><th>Event</th><th>Date</th><th></th></tr></thead><tbody>';checked.forEach(r=>{const ev=events.find(e=>e.EventID===r.EventID);h+='<tr><td><strong>'+esc(ev?ev.EventName:r.EventID)+'</strong></td><td style="font-size:.78rem;">'+esc(ev?ev.Date:'—')+'</td><td>'+t('participated')+'</td></tr>';});h+='</tbody></table></div>';histEl.innerHTML=h;}
  const regEl=document.getElementById('my-registrations');
  if(!myRegs.length){regEl.innerHTML='<div class="alert alert-info">'+t('noRegistrations')+'</div>';}else{let h='';const bc=['var(--haru)','var(--natsu)','var(--aki)','var(--fuyu)'];myRegs.forEach((r,i)=>{const ev=events.find(e=>e.EventID===r.EventID);h+='<div style="border:1px solid var(--border);border-left:3px solid '+bc[i%4]+';border-radius:var(--rs);padding:14px;margin-bottom:10px;"><div style="font-family:Zen Old Mincho,serif;font-weight:700;color:var(--ai);margin-bottom:6px;">'+esc(ev?ev.EventName:r.EventID)+'</div><div style="font-size:.8rem;color:var(--ai-mid);line-height:1.9;">'+(ev?esc(ev.Date)+'<br>':'')+esc((r.CheckinStatus===true||r.CheckinStatus==='TRUE'||r.CheckinStatus==='true')?t('participated'):t('notYet'))+'</div><details style="margin-top:10px;"><summary style="font-size:.78rem;color:var(--ai-mid);cursor:pointer;font-weight:600;">'+t('showQR')+'</summary><div style="text-align:center;padding:12px 0;"><div id="qr-r-'+esc(r.RegistrationID)+'"></div><div class="ticket__id" style="margin-top:6px;">'+esc(r.QR)+'</div></div></details></div>';});regEl.innerHTML=h;myRegs.forEach(r=>{const el=document.getElementById('qr-r-'+r.RegistrationID);if(el&&r.QR)new QRCode(el,{text:r.QR,width:160,height:160,colorDark:'#1a2744',colorLight:'#f8f9fc'});});}
  const unanswered=mySurveys.filter(s=>!s.Rating||s.Rating==='');
  if(mySurveys.length>0){document.getElementById('survey-tab-btn').style.display='block';renderMySurveys(mySurveys,p.ParticipantID);if(unanswered.length>0){const btn=document.getElementById('survey-tab-btn');btn.textContent=t('surveyTab')+' ('+unanswered.length+')';}}
  }catch(err){console.error(err);}
}

function switchMyTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  ['my-history','my-registrations','my-survey','my-profile'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('my-'+tab).style.display='block';
  if(btn)btn.classList.add('active');
  if(tab==='profile')renderProfileEdit();
}

function renderProfileEdit(){
  if(!currentUser)return;
  const p=currentUser;
  document.getElementById('my-profile').innerHTML=
    '<div id="profile-edit-alert"></div>'+
    '<div class="form-group">'+
      '<label class="form-label" data-i18n="nameLabel">お名前</label>'+
      '<input id="edit-name" class="form-control" type="text" value="'+esc(p.Name||'')+'">'+
    '</div>'+
    '<div class="form-group">'+
      '<label class="form-label" data-i18n="emailLabel">メールアドレス</label>'+
      '<input id="edit-email" class="form-control" type="email" value="'+esc(p.Email||'')+'">'+
      '<p style="font-size:.72rem;color:var(--ai-soft);margin-top:5px;line-height:1.6;" data-i18n="emailChangeNote">メールアドレスを変更すると次回ログイン時に新しいアドレスが必要になります</p>'+
    '</div>'+
    '<div class="form-group">'+
      '<label class="form-label" data-i18n="langLabel">表示言語</label>'+
      '<select id="edit-lang" class="form-control" onchange="setLang(this.value)">'+
        ['ja','en','zh','ko','es','fr','pt','id','th','vi','ar','hi','de','it','ru'].map(l=>
          '<option value="'+l+'"'+(currentLang===l?' selected':'')+'>'+
          {'ja':'日本語','en':'English','zh':'中文','ko':'한국어','es':'Español','fr':'Français','pt':'Português','id':'Indonesia','th':'ภาษาไทย','vi':'Tiếng Việt','ar':'العربية','hi':'हिन्दी','de':'Deutsch','it':'Italiano','ru':'Русский'}[l]+
          '</option>'
        ).join('')+
      '</select>'+
    '</div>'+
    '<button class="btn btn-ai btn-full" onclick="saveProfileEdit()" data-i18n="saveProfile">変更を保存</button>';
  // i18n を再適用（新しく追加したノードに）
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});
}

async function saveProfileEdit(){
  const alertEl=document.getElementById('profile-edit-alert');
  alertEl.innerHTML='';
  const newName=document.getElementById('edit-name').value.trim();
  const newEmail=document.getElementById('edit-email').value.trim();
  if(!newName){alertEl.innerHTML='<div class="alert alert-danger">'+t('nameRequired')+'</div>';return;}
  if(!newEmail||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){alertEl.innerHTML='<div class="alert alert-danger">'+t('invalidEmail')+'</div>';return;}
  const btn=document.querySelector('#my-profile .btn-ai');
  btn.disabled=true;btn.textContent=t('saving');
  try{
    const updated=await api('updateParticipantProfile',{participantId:currentUser.ParticipantID,name:newName,email:newEmail});
    currentUser=Object.assign({},currentUser,{Name:updated.Name||newName,Email:updated.Email||newEmail});
    sessionStorage.setItem('auth_user',JSON.stringify(currentUser));
    document.getElementById('header-username').textContent=currentUser.Name;
    // プロフィールカードも更新
    document.getElementById('profile-card').querySelector('.profile-name').textContent=currentUser.Name;
    document.getElementById('profile-card').querySelector('.profile-email').textContent=currentUser.Email;
    alertEl.innerHTML='<div class="alert alert-success">'+t('profileSaved')+'</div>';
  }catch(err){
    alertEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';
  }
  btn.disabled=false;btn.textContent=t('saveProfile');
}

function renderMySurveys(surveys,participantId){const surveyEl=document.getElementById('my-survey');if(!surveys||!surveys.length){surveyEl.innerHTML='<div class="alert alert-info">'+t('noSurveys')+'</div>';return;}let html='';surveys.forEach(s=>{if(s.Rating&&Number(s.Rating)>0){html+='<div class="survey-done"><div style="font-weight:700;margin-bottom:4px;">'+esc(s.EventName)+'</div><div class="star-display">'+'★'.repeat(Number(s.Rating))+'☆'.repeat(5-Number(s.Rating))+'  '+s.Rating+'/5</div>'+(s.Comment?'<div style="margin-top:3px;font-size:.8rem;color:var(--ai-mid);">'+esc(s.Comment)+'</div>':'')+'</div>';}else{const sid='srv_'+s.SurveyID;html+='<div class="survey-form" id="sf-'+esc(s.SurveyID)+'"><h4>'+esc(s.EventName)+'　'+t('surveyTitle')+'</h4><div class="star-rating">';for(let i=5;i>=1;i--)html+='<input type="radio" id="'+sid+'_'+i+'" name="'+sid+'" value="'+i+'"><label for="'+sid+'_'+i+'">★</label>';html+='</div><textarea id="cmt-'+esc(s.SurveyID)+'" class="form-control" rows="2" placeholder="'+t('surveyCommentPlaceholder')+'" style="margin-bottom:8px;resize:none;"></textarea><button class="btn btn-ai btn-full" onclick="submitSurveyForm(\''+esc(s.SurveyID)+'\',\''+esc(s.EventID)+'\',\''+esc(participantId)+'\')">'+t('surveySubmit')+'</button></div>';}});surveyEl.innerHTML=html;}

async function submitSurveyForm(surveyId,eventId,participantId){const ratingEl=document.querySelector('input[name="srv_'+surveyId+'"]:checked');if(!ratingEl){alert(t('surveyRatingRequired'));return;}const rating=ratingEl.value;const comment=document.getElementById('cmt-'+surveyId).value.trim();try{await api('submitSurvey',{surveyId,eventId,participantId,rating,comment});const formEl=document.getElementById('sf-'+surveyId);if(formEl)formEl.outerHTML='<div class="survey-done">'+t('surveyThanks')+'<br><span class="star-display">'+'★'.repeat(Number(rating))+'☆'.repeat(5-Number(rating))+'</span></div>';}catch(err){alert(esc(err.message));}}
</script>
